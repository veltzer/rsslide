# Project-local rsslide configuration. Auto-discovered by rsslide when run
# from this directory. Every section is optional — only override what you
# want to differ from the built-in defaults.
#
# Run `rsslide dump-config` to see the full annotated defaults.

[slide]
# Match marp's default slide size: 960 x 540 pt (13.333" x 7.5" at 72dpi),
# which is also PowerPoint widescreen. In millimeters: 338.667 x 190.5.
width_mm = 338.667
height_mm = 190.5
# Tighten margins so slide content fills more of the page.
margin_x_mm = 4.0
margin_top_mm = 6.0
page_bottom_reserved_mm = 1.0

[title]
# Tighter spacing under the title → more room for SVGs / content below.
rule_offset_mm = 7.0
content_gap_mm = 2.0

[svg]
# Push the SVG well below the title rule AND let it extend almost to the
# slide edges so the diagram dominates the page.
top_gap_mm = 20.0
margin_x_mm = 0.0
