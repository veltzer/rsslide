[package]
name = "rsslide"
version = "0.1.0"
edition = "2024"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
printpdf = "0.7"
tera = "1"
zip = "2"
syntect = { version = "5", default-features = false, features = ["default-syntaxes", "default-themes", "html", "regex-fancy"] }
anyhow = "1"

[profile.release]
strip = true
lto = true
codegen-units = 1
