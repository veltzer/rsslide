title: Alignment Examples
theme: default
paginate: true

# NOTE: 'align' and 'valign' are slide-level properties — they apply to all
# content on the slide (title, body text, and bullets) uniformly.
# Per-element alignment (e.g. centred title with left-aligned bullets) is not
# yet supported.
#
# This file demonstrates all 9 combinations of:
#   align:  left (default) | center | right
#   valign: top (default)  | middle | bottom

slides:

  # ── Row 1: valign top ────────────────────────────────────────────────────

  - title: align left · valign top (default)
    # This is the default — no properties needed.
    bullets:
      - First bullet
      - Second bullet
      - Third bullet

  - title: align center · valign top
    align: center
    bullets:
      - First bullet
      - Second bullet
      - Third bullet

  - title: align right · valign top
    align: right
    bullets:
      - First bullet
      - Second bullet
      - Third bullet

  # ── Row 2: valign middle ─────────────────────────────────────────────────

  - title: align left · valign middle
    valign: middle
    bullets:
      - First bullet
      - Second bullet
      - Third bullet

  - title: align center · valign middle
    align: center
    valign: middle
    bullets:
      - First bullet
      - Second bullet
      - Third bullet

  - title: align right · valign middle
    align: right
    valign: middle
    bullets:
      - First bullet
      - Second bullet
      - Third bullet

  # ── Row 3: valign bottom ─────────────────────────────────────────────────

  - title: align left · valign bottom
    valign: bottom
    bullets:
      - First bullet
      - Second bullet
      - Third bullet

  - title: align center · valign bottom
    align: center
    valign: bottom
    bullets:
      - First bullet
      - Second bullet
      - Third bullet

  - title: align right · valign bottom
    align: right
    valign: bottom
    bullets:
      - First bullet
      - Second bullet
      - Third bullet
