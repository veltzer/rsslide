<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Arial, sans-serif" style="background:var(--bg)">
  <metadata>
    <type>regular</type>
  </metadata>
  <defs>
    <style id="palette-vars">
      :root, svg {
        --bg: #ffffff;
        --surface: #c4cdd6;
        --border: #6b7280;
        --text: #212121;
        --text-muted: #555555;
        --text-faint: #888888;
        --code-bg: #1a1a2e;
        --shadow: #00000044;
        --black: #000000;
        --primary-fill: #5a7a9c;
        --primary-border: #3d5a7d;
        --primary-text: #ffffff;
        --primary-accent: #243b59;
        --ok-fill: #7a9a6a;
        --ok-border: #5a7a4d;
        --ok-text: #ffffff;
        --ok-accent: #385030;
        --warn-fill: #c8924a;
        --warn-border: #9c6e2e;
        --warn-text: #ffffff;
        --warn-accent: #5a3f12;
        --danger-fill: #a86058;
        --danger-border: #7d3f38;
        --danger-text: #ffffff;
        --danger-accent: #4a1f1a;
        --info-fill: #7c6a8e;
        --info-border: #574a68;
        --info-text: #ffffff;
        --info-accent: #2f253b;
      }
    </style>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7493b3"/>
      <stop offset="100%" stop-color="#3d5a7d"/>
    </linearGradient>

    <linearGradient id="grad-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4cdd6"/>
    </linearGradient>

    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94b384"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>

    <linearGradient id="grad-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dba868"/>
      <stop offset="100%" stop-color="#9c6e2e"/>
    </linearGradient>

    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd7d75"/>
      <stop offset="100%" stop-color="#7d3f38"/>
    </linearGradient>

    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9384a5"/>
      <stop offset="100%" stop-color="#574a68"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000044"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#555555"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#3d5a7d"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#5a7a4d"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9c6e2e"/>
    </marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#7d3f38"/>
    </marker>
    <marker id="arrow-info" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#574a68"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#ffffff"/>
    </marker>
  </defs>
  <text x="649.375" y="40" text-anchor="middle" font-size="31.1748" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">IPSec VPN Modes</text>
  <text x="649.375" y="113.8182" text-anchor="middle" font-size="25.979" font-weight="bold" fill="var(--primary-accent)" font-family="Arial, sans-serif">Transport Mode</text>
  <rect x="40" y="134.9091" width="300" height="105.4545" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="190.0001" y="177.091" text-anchor="middle" font-size="20.7832" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">IP Header</text>
  <text x="190.0001" y="212.9455" text-anchor="middle" font-size="17.3194" fill="var(--text-muted)" font-family="Arial, sans-serif">(original)</text>
  <rect x="340" y="134.9091" width="375" height="105.4545" rx="6" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="527.5001" y="177.091" text-anchor="middle" font-size="20.7832" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">IPSec Header</text>
  <text x="527.5001" y="212.9455" text-anchor="middle" font-size="17.3194" fill="var(--text-muted)" font-family="Arial, sans-serif">(ESP/AH)</text>
  <rect x="715" y="134.9091" width="525" height="105.4545" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="977.5001" y="177.091" text-anchor="middle" font-size="20.7832" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Original Data</text>
  <text x="977.5001" y="212.9455" text-anchor="middle" font-size="17.3194" fill="var(--text-muted)" font-family="Arial, sans-serif">(encrypted)</text>
  <text x="649.375" y="335.2727" text-anchor="middle" font-size="25.979" font-weight="bold" fill="var(--ok-accent)" font-family="Arial, sans-serif">Tunnel Mode</text>
  <rect x="40" y="356.3636" width="224.9999" height="105.4545" rx="6" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="152.5001" y="398.5454" text-anchor="middle" font-size="20.7832" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">New IP Hdr</text>
  <text x="152.5001" y="434.4" text-anchor="middle" font-size="17.3194" fill="var(--text-muted)" font-family="Arial, sans-serif">Outer IP</text>
  <rect x="265.0001" y="356.3636" width="281.25" height="105.4545" rx="6" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="405.625" y="398.5454" text-anchor="middle" font-size="20.7832" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">IPSec Header</text>
  <text x="405.625" y="434.4" text-anchor="middle" font-size="17.3194" fill="var(--text-muted)" font-family="Arial, sans-serif">(ESP/AH)</text>
  <rect x="546.25" y="356.3636" width="262.4999" height="105.4545" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="677.5" y="398.5454" text-anchor="middle" font-size="20.7832" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Orig IP Hdr</text>
  <text x="677.5" y="434.4" text-anchor="middle" font-size="17.3194" fill="var(--text-muted)" font-family="Arial, sans-serif">Inner IP</text>
  <rect x="808.7501" y="356.3636" width="431.2499" height="105.4545" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="1024.375" y="398.5454" text-anchor="middle" font-size="20.7832" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Original Data</text>
  <text x="1024.375" y="434.4" text-anchor="middle" font-size="17.3194" fill="var(--text-muted)" font-family="Arial, sans-serif">(encrypted)</text>
  <rect x="265.0001" y="472.3637" width="974.9999" height="52.7273" rx="6" fill="none" stroke="var(--border)" stroke-width="1" stroke-dasharray="7.9582 4.7749"/>
  <text x="752.5001" y="508.2182" text-anchor="middle" font-size="19.0513" fill="var(--danger-accent)" font-family="Arial, sans-serif">Everything inside is encrypted</text>
  <rect x="133.7501" y="556.7273" width="1031.25" height="63.2727" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="649.375" y="598.9091" text-anchor="middle" font-size="20.7832" fill="var(--text)" font-family="Arial, sans-serif">Transport: end-to-end between hosts | Tunnel: gateway-to-gateway (site-to-site VPN)</text>
</svg>
