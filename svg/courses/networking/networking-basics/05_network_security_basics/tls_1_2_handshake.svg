<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Arial, sans-serif" style="background:var(--bg)">
  <metadata>
    <type>regular</type>
  </metadata>
  <text x="640" y="40" text-anchor="middle" font-size="22.5741" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">TLS 1.2 Handshake</text>
  <rect x="40" y="56.8932" width="240" height="45.0485" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="159.9999" y="85.0486" text-anchor="middle" font-size="17.5577" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Client</text>
  <line x1="159.9999" y1="101.9418" x2="159.9999" y2="620" stroke="var(--primary-border)" stroke-width="1.7778" stroke-dasharray="4.7407 4.7407"/>
  <rect x="1000" y="56.8932" width="240" height="45.0485" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="1120.0001" y="85.0486" text-anchor="middle" font-size="17.5577" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Server</text>
  <line x1="1120.0001" y1="101.9418" x2="1120.0001" y2="620" stroke="var(--ok-border)" stroke-width="1.7778" stroke-dasharray="4.7407 4.7407"/>
  <line x1="159.9999" y1="124.466" x2="1120.0001" y2="124.466" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <text x="640" y="118.835" text-anchor="middle" font-size="15.0495" font-weight="bold" fill="var(--primary-accent)" font-family="Arial, sans-serif">ClientHello</text>
  <text x="640" y="137.9807" text-anchor="middle" font-size="12.5412" fill="var(--text-muted)" font-family="Arial, sans-serif">TLS version, cipher suites, client random</text>
  <line x1="1120.0001" y1="169.5146" x2="159.9999" y2="169.5146" stroke="var(--ok-border)" stroke-width="2" marker-end="url(#arrow-ok)"/>
  <text x="640" y="163.8835" text-anchor="middle" font-size="15.0495" font-weight="bold" fill="var(--ok-accent)" font-family="Arial, sans-serif">ServerHello</text>
  <text x="640" y="186.4078" text-anchor="middle" font-size="12.5412" fill="var(--text-muted)" font-family="Arial, sans-serif">chosen cipher, server random</text>
  <line x1="1120.0001" y1="208.9321" x2="159.9999" y2="208.9321" stroke="var(--ok-border)" stroke-width="2" marker-end="url(#arrow-ok)"/>
  <text x="640" y="203.301" text-anchor="middle" font-size="15.0495" font-weight="bold" fill="var(--ok-accent)" font-family="Arial, sans-serif">Certificate</text>
  <text x="640" y="223.5728" text-anchor="middle" font-size="12.5412" fill="var(--text-muted)" font-family="Arial, sans-serif">server's X.509 certificate</text>
  <line x1="1120.0001" y1="248.3495" x2="159.9999" y2="248.3495" stroke="var(--ok-border)" stroke-width="2" marker-end="url(#arrow-ok)"/>
  <text x="640" y="242.7185" text-anchor="middle" font-size="15.0495" font-weight="bold" fill="var(--ok-accent)" font-family="Arial, sans-serif">ServerKeyExchange</text>
  <line x1="1120.0001" y1="282.1359" x2="159.9999" y2="282.1359" stroke="var(--ok-border)" stroke-width="2" marker-end="url(#arrow-ok)"/>
  <text x="640" y="276.5049" text-anchor="middle" font-size="15.0495" font-weight="bold" fill="var(--ok-accent)" font-family="Arial, sans-serif">ServerHelloDone</text>
  <line x1="159.9999" y1="327.1845" x2="1120.0001" y2="327.1845" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <text x="640" y="321.5534" text-anchor="middle" font-size="15.0495" font-weight="bold" fill="var(--primary-accent)" font-family="Arial, sans-serif">ClientKeyExchange</text>
  <text x="640" y="344.0777" text-anchor="middle" font-size="12.5412" fill="var(--text-muted)" font-family="Arial, sans-serif">pre-master secret, encrypted</text>
  <line x1="159.9999" y1="372.2331" x2="1120.0001" y2="372.2331" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <text x="640" y="366.602" text-anchor="middle" font-size="15.0495" font-weight="bold" fill="var(--primary-accent)" font-family="Arial, sans-serif">ChangeCipherSpec</text>
  <line x1="159.9999" y1="411.6506" x2="1120.0001" y2="411.6506" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <text x="640" y="406.0195" text-anchor="middle" font-size="15.0495" font-weight="bold" fill="var(--primary-accent)" font-family="Arial, sans-serif">Finished (encrypted)</text>
  <line x1="1120.0001" y1="451.0679" x2="159.9999" y2="451.0679" stroke="var(--ok-border)" stroke-width="2" marker-end="url(#arrow-ok)"/>
  <text x="640" y="445.4369" text-anchor="middle" font-size="15.0495" font-weight="bold" fill="var(--ok-accent)" font-family="Arial, sans-serif">ChangeCipherSpec</text>
  <line x1="1120.0001" y1="490.4854" x2="159.9999" y2="490.4854" stroke="var(--ok-border)" stroke-width="2" marker-end="url(#arrow-ok)"/>
  <text x="640" y="484.8544" text-anchor="middle" font-size="15.0495" font-weight="bold" fill="var(--ok-accent)" font-family="Arial, sans-serif">Finished (encrypted)</text>
  <rect x="112" y="529.9029" width="1056.0003" height="39.4175" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="554.6797" text-anchor="middle" font-size="16.3035" font-weight="bold" fill="var(--ok-accent)" font-family="Arial, sans-serif">Encrypted Application Data</text>
  <text x="640" y="597.4757" text-anchor="middle" font-size="15.0495" fill="var(--text-muted)" font-family="Arial, sans-serif">2 round trips before first application data</text>
  <defs>
    <style id="palette-vars">
      :root, svg {
        --bg: #ffffff;
        --surface: #c4cdd6;
        --border: #6b7280;
        --text: #212121;
        --text-muted: #555555;
        --text-faint: #888888;
        --code-bg: #1a1a2e;
        --shadow: #00000044;
        --black: #000000;
        --primary-fill: #5a7a9c;
        --primary-border: #3d5a7d;
        --primary-text: #ffffff;
        --primary-accent: #243b59;
        --ok-fill: #7a9a6a;
        --ok-border: #5a7a4d;
        --ok-text: #ffffff;
        --ok-accent: #385030;
        --warn-fill: #c8924a;
        --warn-border: #9c6e2e;
        --warn-text: #ffffff;
        --warn-accent: #5a3f12;
        --danger-fill: #a86058;
        --danger-border: #7d3f38;
        --danger-text: #ffffff;
        --danger-accent: #4a1f1a;
        --info-fill: #7c6a8e;
        --info-border: #574a68;
        --info-text: #ffffff;
        --info-accent: #2f253b;
      }
    </style>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7493b3"/>
      <stop offset="100%" stop-color="#3d5a7d"/>
    </linearGradient>

    <linearGradient id="grad-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4cdd6"/>
    </linearGradient>

    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94b384"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>

    <linearGradient id="grad-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dba868"/>
      <stop offset="100%" stop-color="#9c6e2e"/>
    </linearGradient>

    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd7d75"/>
      <stop offset="100%" stop-color="#7d3f38"/>
    </linearGradient>

    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9384a5"/>
      <stop offset="100%" stop-color="#574a68"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000044"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#555555"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#3d5a7d"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#5a7a4d"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9c6e2e"/>
    </marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#7d3f38"/>
    </marker>
    <marker id="arrow-info" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#574a68"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#ffffff"/>
    </marker>
  </defs>
</svg>
