<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Arial, sans-serif" style="background:var(--bg)">
  <metadata>
    <type>regular</type>
  </metadata>
  <text x="640" y="40" text-anchor="middle" font-size="32.4114" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Firewall Concept</text>
  <rect x="40" y="174.8837" width="236.6197" height="148.3721" rx="6" fill="url(#grad-danger)" stroke="var(--danger-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="158.3099" y="242.3256" text-anchor="middle" font-size="23.4083" font-weight="bold" fill="var(--danger-accent)" font-family="Arial, sans-serif">Incoming</text>
  <text x="158.3099" y="288.186" text-anchor="middle" font-size="21.6076" fill="var(--text-muted)" font-family="Arial, sans-serif">Traffic</text>
  <line x1="276.6198" y1="228.8372" x2="394.9296" y2="228.8372" stroke="var(--danger-border)" stroke-width="2" marker-end="url(#arrow-danger)"/>
  <rect x="394.9296" y="107.4419" width="490.1408" height="512.5581" rx="6" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="174.8837" text-anchor="middle" font-size="28.8101" font-weight="bold" fill="var(--danger-accent)" font-family="Arial, sans-serif">FIREWALL</text>
  <rect x="428.7325" y="201.8605" width="422.5353" height="80.9302" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="255.814" text-anchor="middle" font-size="21.6076" fill="var(--text)" font-family="Arial, sans-serif">Rule 1: Allow SSH (port 22)</text>
  <rect x="428.7325" y="296.2791" width="422.5353" height="80.9302" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="350.2326" text-anchor="middle" font-size="21.6076" fill="var(--text)" font-family="Arial, sans-serif">Rule 2: Allow HTTP (port 80)</text>
  <rect x="428.7325" y="390.6977" width="422.5353" height="80.9302" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="444.6512" text-anchor="middle" font-size="21.6076" fill="var(--text)" font-family="Arial, sans-serif">Rule 3: Allow HTTPS (port 443)</text>
  <rect x="428.7325" y="485.1163" width="422.5353" height="80.9302" rx="6" fill="url(#grad-danger)" stroke="var(--danger-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="539.0698" text-anchor="middle" font-size="21.6076" fill="var(--danger-accent)" font-family="Arial, sans-serif">Rule 4: Drop all other</text>
  <line x1="885.0705" y1="228.8372" x2="1003.3803" y2="228.8372" stroke="var(--ok-border)" stroke-width="2" marker-end="url(#arrow-ok)"/>
  <rect x="1003.3803" y="147.907" width="236.6197" height="215.814" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="1121.6902" y="228.8372" text-anchor="middle" font-size="23.4083" font-weight="bold" fill="var(--ok-accent)" font-family="Arial, sans-serif">Internal</text>
  <text x="1121.6902" y="277.3953" text-anchor="middle" font-size="21.6076" fill="var(--text-muted)" font-family="Arial, sans-serif">Network</text>
  <text x="1121.6902" y="325.9535" text-anchor="middle" font-size="21.6076" fill="var(--text-muted)" font-family="Arial, sans-serif">Servers</text>
  <line x1="1003.3803" y1="471.6279" x2="885.0705" y2="471.6279" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <line x1="394.9296" y1="471.6279" x2="276.6198" y2="471.6279" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <rect x="40" y="417.6744" width="236.6197" height="121.3953" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="158.3099" y="485.1163" text-anchor="middle" font-size="23.4083" font-weight="bold" fill="var(--primary-accent)" font-family="Arial, sans-serif">Outgoing</text>
  <defs>
    <style id="palette-vars">
      :root, svg {
        --bg: #ffffff;
        --surface: #c4cdd6;
        --border: #6b7280;
        --text: #212121;
        --text-muted: #555555;
        --text-faint: #888888;
        --code-bg: #1a1a2e;
        --shadow: #00000044;
        --black: #000000;
        --primary-fill: #5a7a9c;
        --primary-border: #3d5a7d;
        --primary-text: #ffffff;
        --primary-accent: #243b59;
        --ok-fill: #7a9a6a;
        --ok-border: #5a7a4d;
        --ok-text: #ffffff;
        --ok-accent: #385030;
        --warn-fill: #c8924a;
        --warn-border: #9c6e2e;
        --warn-text: #ffffff;
        --warn-accent: #5a3f12;
        --danger-fill: #a86058;
        --danger-border: #7d3f38;
        --danger-text: #ffffff;
        --danger-accent: #4a1f1a;
        --info-fill: #7c6a8e;
        --info-border: #574a68;
        --info-text: #ffffff;
        --info-accent: #2f253b;
      }
    </style>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7493b3"/>
      <stop offset="100%" stop-color="#3d5a7d"/>
    </linearGradient>

    <linearGradient id="grad-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4cdd6"/>
    </linearGradient>

    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94b384"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>

    <linearGradient id="grad-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dba868"/>
      <stop offset="100%" stop-color="#9c6e2e"/>
    </linearGradient>

    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd7d75"/>
      <stop offset="100%" stop-color="#7d3f38"/>
    </linearGradient>

    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9384a5"/>
      <stop offset="100%" stop-color="#574a68"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000044"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#555555"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#3d5a7d"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#5a7a4d"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9c6e2e"/>
    </marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#7d3f38"/>
    </marker>
    <marker id="arrow-info" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#574a68"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#ffffff"/>
    </marker>
  </defs>
</svg>
