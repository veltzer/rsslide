<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Arial, sans-serif" style="background:var(--bg)">
  <metadata>
    <type>regular</type>
  </metadata>
  <text x="640" y="40" text-anchor="middle" font-size="34.7139" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Asymmetric Encryption</text>
  <rect x="457.3913" y="72.2222" width="365.2174" height="150.3704" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="119.4814" text-anchor="middle" font-size="26.9997" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Key Pair</text>
  <text x="640" y="162.4445" text-anchor="middle" font-size="23.1426" fill="var(--ok-accent)" font-family="Arial, sans-serif">Public Key - Anyone can have</text>
  <text x="640" y="201.1111" text-anchor="middle" font-size="23.1426" fill="var(--danger-accent)" font-family="Arial, sans-serif">Private Key - Only owner has</text>
  <text x="318.2609" y="297.7778" text-anchor="middle" font-size="28.9283" font-weight="bold" fill="var(--primary-accent)" font-family="Arial, sans-serif">Encryption</text>
  <rect x="40" y="329.9999" width="191.3043" height="107.4074" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="135.6522" y="394.4444" text-anchor="middle" font-size="25.0712" fill="var(--text)" font-family="Arial, sans-serif">Plain Text</text>
  <line x1="231.3043" y1="383.7037" x2="353.0435" y2="383.7037" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <text x="292.1739" y="362.2222" text-anchor="middle" font-size="19.2855" fill="var(--primary-accent)" font-family="Arial, sans-serif">Public Key</text>
  <rect x="353.0435" y="329.9999" width="208.6957" height="107.4074" rx="6" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="457.3913" y="394.4444" text-anchor="middle" font-size="25.0712" fill="var(--text)" font-family="Arial, sans-serif">Cipher Text</text>
  <line x1="457.3913" y1="437.4074" x2="457.3913" y2="501.8519" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <rect x="353.0435" y="512.5926" width="208.6957" height="107.4074" rx="6" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="457.3913" y="577.0371" text-anchor="middle" font-size="25.0712" fill="var(--text)" font-family="Arial, sans-serif">Cipher Text</text>
  <line x1="353.0435" y1="566.2963" x2="231.3043" y2="566.2963" stroke="var(--ok-border)" stroke-width="2" marker-end="url(#arrow-ok)"/>
  <text x="292.1739" y="544.8148" text-anchor="middle" font-size="19.2855" fill="var(--danger-accent)" font-family="Arial, sans-serif">Private Key</text>
  <rect x="40" y="512.5926" width="191.3043" height="107.4074" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="135.6522" y="577.0371" text-anchor="middle" font-size="25.0712" fill="var(--text)" font-family="Arial, sans-serif">Plain Text</text>
  <text x="961.7391" y="297.7778" text-anchor="middle" font-size="28.9283" font-weight="bold" fill="var(--ok-accent)" font-family="Arial, sans-serif">Digital Signature</text>
  <rect x="700.8695" y="329.9999" width="191.3043" height="107.4074" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="796.5217" y="394.4444" text-anchor="middle" font-size="25.0712" fill="var(--text)" font-family="Arial, sans-serif">Data</text>
  <line x1="892.1739" y1="383.7037" x2="1013.913" y2="383.7037" stroke="var(--ok-border)" stroke-width="2" marker-end="url(#arrow-ok)"/>
  <text x="953.0435" y="362.2222" text-anchor="middle" font-size="19.2855" fill="var(--danger-accent)" font-family="Arial, sans-serif">Private Key</text>
  <rect x="1013.913" y="329.9999" width="226.087" height="107.4074" rx="6" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="1126.9566" y="394.4444" text-anchor="middle" font-size="25.0712" fill="var(--text)" font-family="Arial, sans-serif">Signed Data</text>
  <line x1="1126.9566" y1="437.4074" x2="1126.9566" y2="501.8519" stroke="var(--ok-border)" stroke-width="2" marker-end="url(#arrow-ok)"/>
  <rect x="1013.913" y="512.5926" width="226.087" height="107.4074" rx="6" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="1126.9566" y="577.0371" text-anchor="middle" font-size="25.0712" fill="var(--text)" font-family="Arial, sans-serif">Signed Data</text>
  <line x1="1013.913" y1="566.2963" x2="892.1739" y2="566.2963" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <text x="953.0435" y="544.8148" text-anchor="middle" font-size="19.2855" fill="var(--primary-accent)" font-family="Arial, sans-serif">Public Key</text>
  <rect x="700.8695" y="512.5926" width="191.3043" height="107.4074" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="796.5217" y="577.0371" text-anchor="middle" font-size="25.0712" fill="var(--text)" font-family="Arial, sans-serif">Valid?</text>
  <defs>
    <style id="palette-vars">
      :root, svg {
        --bg: #ffffff;
        --surface: #c4cdd6;
        --border: #6b7280;
        --text: #212121;
        --text-muted: #555555;
        --text-faint: #888888;
        --code-bg: #1a1a2e;
        --shadow: #00000044;
        --black: #000000;
        --primary-fill: #5a7a9c;
        --primary-border: #3d5a7d;
        --primary-text: #ffffff;
        --primary-accent: #243b59;
        --ok-fill: #7a9a6a;
        --ok-border: #5a7a4d;
        --ok-text: #ffffff;
        --ok-accent: #385030;
        --warn-fill: #c8924a;
        --warn-border: #9c6e2e;
        --warn-text: #ffffff;
        --warn-accent: #5a3f12;
        --danger-fill: #a86058;
        --danger-border: #7d3f38;
        --danger-text: #ffffff;
        --danger-accent: #4a1f1a;
        --info-fill: #7c6a8e;
        --info-border: #574a68;
        --info-text: #ffffff;
        --info-accent: #2f253b;
      }
    </style>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7493b3"/>
      <stop offset="100%" stop-color="#3d5a7d"/>
    </linearGradient>

    <linearGradient id="grad-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4cdd6"/>
    </linearGradient>

    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94b384"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>

    <linearGradient id="grad-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dba868"/>
      <stop offset="100%" stop-color="#9c6e2e"/>
    </linearGradient>

    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd7d75"/>
      <stop offset="100%" stop-color="#7d3f38"/>
    </linearGradient>

    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9384a5"/>
      <stop offset="100%" stop-color="#574a68"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000044"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#555555"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#3d5a7d"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#5a7a4d"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9c6e2e"/>
    </marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#7d3f38"/>
    </marker>
    <marker id="arrow-info" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#574a68"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#ffffff"/>
    </marker>
  </defs>
</svg>
