<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Arial, sans-serif" style="background:var(--bg)">
  <metadata>
    <type>regular</type>
  </metadata>
  <!-- PLACEHOLDERSVG — replace with real diagram -->
  <text x="639.9999" y="40" text-anchor="middle" font-size="30.4895" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Zero Trust Network Architecture</text>
  <text x="318.2609" y="121.2" text-anchor="middle" font-size="23.7141" font-weight="bold" fill="var(--danger-accent)" font-family="Arial, sans-serif">Traditional Model</text>
  <rect x="40" y="144.4001" width="556.5217" height="347.9999" rx="6" fill="url(#grad-danger)" stroke="var(--danger-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="318.2609" y="202.4" text-anchor="middle" font-size="22.0203" fill="var(--text)" font-family="Arial, sans-serif">Trusted Network</text>
  <rect x="92.1739" y="225.6" width="121.7391" height="104.4" rx="6" fill="var(--text-muted)" stroke="var(--danger-border)" stroke-width="2.4381"/>
  <text x="153.0435" y="288.2401" text-anchor="middle" font-size="23.7141" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">A</text>
  <line x1="213.913" y1="276.64" x2="257.3913" y2="276.64" stroke="var(--danger-border)" stroke-width="2" marker-end="url(#arrow-danger)"/>
  <rect x="257.3913" y="225.6" width="121.7391" height="104.4" rx="6" fill="var(--text-muted)" stroke="var(--danger-border)" stroke-width="2.4381"/>
  <text x="318.2609" y="288.2401" text-anchor="middle" font-size="23.7141" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">B</text>
  <line x1="379.1304" y1="276.64" x2="422.6087" y2="276.64" stroke="var(--danger-border)" stroke-width="2" marker-end="url(#arrow-danger)"/>
  <rect x="422.6087" y="225.6" width="121.7391" height="104.4" rx="6" fill="var(--text-muted)" stroke="var(--danger-border)" stroke-width="2.4381"/>
  <text x="483.4782" y="288.2401" text-anchor="middle" font-size="23.7141" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">C</text>
  <text x="318.2609" y="399.6" text-anchor="middle" font-size="20.3264" fill="var(--danger-accent)" font-weight="bold" font-family="Arial, sans-serif">Free lateral movement</text>
  <text x="318.2609" y="446" text-anchor="middle" font-size="18.6324" fill="var(--text-muted)" font-family="Arial, sans-serif">Once inside, access everything</text>
  <text x="961.739" y="121.2" text-anchor="middle" font-size="23.7141" font-weight="bold" fill="var(--ok-accent)" font-family="Arial, sans-serif">Zero Trust Model</text>
  <rect x="683.4783" y="144.4001" width="556.5217" height="347.9999" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="961.739" y="202.4" text-anchor="middle" font-size="22.0203" fill="var(--text)" font-family="Arial, sans-serif">No Implicit Trust</text>
  <rect x="735.6522" y="225.6" width="121.7391" height="104.4" rx="6" fill="var(--text-muted)" stroke="var(--ok-border)" stroke-width="2.4381"/>
  <text x="796.5217" y="288.2401" text-anchor="middle" font-size="23.7141" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">A</text>
  <line x1="857.3912" y1="265.04" x2="892.1739" y2="265.04" stroke="var(--ok-border)" stroke-width="2"/>
  <text x="883.4781" y="299.84" font-size="23.7141" fill="var(--danger-accent)" font-family="Arial, sans-serif">X</text>
  <rect x="900.8695" y="225.6" width="121.7391" height="104.4" rx="6" fill="var(--text-muted)" stroke="var(--ok-border)" stroke-width="2.4381"/>
  <text x="961.739" y="288.2401" text-anchor="middle" font-size="23.7141" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">B</text>
  <line x1="1022.6086" y1="265.04" x2="1057.3912" y2="265.04" stroke="var(--ok-border)" stroke-width="2"/>
  <text x="1048.6956" y="299.84" font-size="23.7141" fill="var(--danger-accent)" font-family="Arial, sans-serif">X</text>
  <rect x="1066.0868" y="225.6" width="121.7391" height="104.4" rx="6" fill="var(--text-muted)" stroke="var(--ok-border)" stroke-width="2.4381"/>
  <text x="1126.9565" y="288.2401" text-anchor="middle" font-size="23.7141" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">C</text>
  <text x="961.739" y="399.6" text-anchor="middle" font-size="20.3264" fill="var(--ok-accent)" font-weight="bold" font-family="Arial, sans-serif">Every connection authenticated</text>
  <text x="961.739" y="446" text-anchor="middle" font-size="18.6324" fill="var(--text-muted)" font-family="Arial, sans-serif">Verify explicitly, least privilege</text>
  <rect x="248.6956" y="538.8" width="782.6087" height="81.2" rx="6" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="639.9999" y="589.84" text-anchor="middle" font-size="20.3264" fill="var(--text)" font-family="Arial, sans-serif">"Never trust, always verify" - authenticate every request regardless of source</text>
  <defs>
    <style id="palette-vars">
      :root, svg {
        --bg: #ffffff;
        --surface: #c4cdd6;
        --border: #6b7280;
        --text: #212121;
        --text-muted: #555555;
        --text-faint: #888888;
        --code-bg: #1a1a2e;
        --shadow: #00000044;
        --black: #000000;
        --primary-fill: #5a7a9c;
        --primary-border: #3d5a7d;
        --primary-text: #ffffff;
        --primary-accent: #243b59;
        --ok-fill: #7a9a6a;
        --ok-border: #5a7a4d;
        --ok-text: #ffffff;
        --ok-accent: #385030;
        --warn-fill: #c8924a;
        --warn-border: #9c6e2e;
        --warn-text: #ffffff;
        --warn-accent: #5a3f12;
        --danger-fill: #a86058;
        --danger-border: #7d3f38;
        --danger-text: #ffffff;
        --danger-accent: #4a1f1a;
        --info-fill: #7c6a8e;
        --info-border: #574a68;
        --info-text: #ffffff;
        --info-accent: #2f253b;
      }
    </style>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7493b3"/>
      <stop offset="100%" stop-color="#3d5a7d"/>
    </linearGradient>

    <linearGradient id="grad-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4cdd6"/>
    </linearGradient>

    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94b384"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>

    <linearGradient id="grad-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dba868"/>
      <stop offset="100%" stop-color="#9c6e2e"/>
    </linearGradient>

    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd7d75"/>
      <stop offset="100%" stop-color="#7d3f38"/>
    </linearGradient>

    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9384a5"/>
      <stop offset="100%" stop-color="#574a68"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000044"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#555555"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#3d5a7d"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#5a7a4d"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9c6e2e"/>
    </marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#7d3f38"/>
    </marker>
    <marker id="arrow-info" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#574a68"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#ffffff"/>
    </marker>
  </defs>
</svg>
