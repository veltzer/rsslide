<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Arial, sans-serif" style="background:var(--bg)">
  <metadata>
    <type>regular</type>
  </metadata>
  <text x="640.0001" y="40" text-anchor="middle" font-size="34.9322" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">iptables / Netfilter Basics</text>
  <rect x="40" y="92.7273" width="1200" height="527.2727" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="640.0001" y="158.6364" text-anchor="middle" font-size="29.1102" font-weight="bold" fill="var(--primary-accent)" font-family="Arial, sans-serif">Netfilter</text>
  <rect x="77.5001" y="198.1818" width="206.25" height="105.4545" rx="6" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="180.625" y="264.0909" text-anchor="middle" font-size="23.2882" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">PREROUTING</text>
  <line x1="283.75" y1="250.9091" x2="349.375" y2="250.9091" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <rect x="349.375" y="198.1818" width="150" height="105.4545" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="424.3751" y="264.0909" text-anchor="middle" font-size="23.2882" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">INPUT</text>
  <line x1="499.375" y1="250.9091" x2="583.7501" y2="250.9091" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <rect x="583.7501" y="185" width="243.75" height="131.8182" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="705.6251" y="245.6364" text-anchor="middle" font-size="21.3475" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">[Local Process]</text>
  <text x="705.6251" y="290.4545" text-anchor="middle" font-size="19.4068" fill="var(--text-muted)" font-family="Arial, sans-serif">Application</text>
  <line x1="827.5" y1="250.9091" x2="893.125" y2="250.9091" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <rect x="893.125" y="198.1818" width="150" height="105.4545" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="968.1251" y="264.0909" text-anchor="middle" font-size="23.2882" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">OUTPUT</text>
  <line x1="1043.1251" y1="250.9091" x2="1071.25" y2="250.9091" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <rect x="1071.25" y="198.1818" width="150" height="105.4545" rx="6" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="1146.2501" y="245.6364" text-anchor="middle" font-size="19.4068" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">POST</text>
  <text x="1146.2501" y="282.5455" text-anchor="middle" font-size="19.4068" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">ROUTING</text>
  <line x1="180.625" y1="303.6364" x2="180.625" y2="422.2727" stroke="var(--danger-border)" stroke-width="2"/>
  <line x1="180.625" y1="422.2727" x2="358.7501" y2="422.2727" stroke="var(--danger-border)" stroke-width="2" marker-end="url(#arrow-danger)"/>
  <rect x="358.7501" y="369.5455" width="206.25" height="105.4545" rx="6" fill="url(#grad-danger)" stroke="var(--danger-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="461.875" y="435.4545" text-anchor="middle" font-size="23.2882" font-weight="bold" fill="var(--danger-accent)" font-family="Arial, sans-serif">FORWARD</text>
  <text x="461.875" y="514.5455" text-anchor="middle" font-size="19.4068" fill="var(--text-muted)" font-family="Arial, sans-serif">(routing)</text>
  <line x1="565" y1="422.2727" x2="968.1251" y2="422.2727" stroke="var(--danger-border)" stroke-width="2"/>
  <line x1="968.1251" y1="422.2727" x2="968.1251" y2="303.6364" stroke="var(--danger-border)" stroke-width="2" marker-end="url(#arrow-danger)"/>
  <defs>
    <style id="palette-vars">
      :root, svg {
        --bg: #ffffff;
        --surface: #c4cdd6;
        --border: #6b7280;
        --text: #212121;
        --text-muted: #555555;
        --text-faint: #888888;
        --code-bg: #1a1a2e;
        --shadow: #00000044;
        --black: #000000;
        --primary-fill: #5a7a9c;
        --primary-border: #3d5a7d;
        --primary-text: #ffffff;
        --primary-accent: #243b59;
        --ok-fill: #7a9a6a;
        --ok-border: #5a7a4d;
        --ok-text: #ffffff;
        --ok-accent: #385030;
        --warn-fill: #c8924a;
        --warn-border: #9c6e2e;
        --warn-text: #ffffff;
        --warn-accent: #5a3f12;
        --danger-fill: #a86058;
        --danger-border: #7d3f38;
        --danger-text: #ffffff;
        --danger-accent: #4a1f1a;
        --info-fill: #7c6a8e;
        --info-border: #574a68;
        --info-text: #ffffff;
        --info-accent: #2f253b;
      }
    </style>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7493b3"/>
      <stop offset="100%" stop-color="#3d5a7d"/>
    </linearGradient>

    <linearGradient id="grad-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4cdd6"/>
    </linearGradient>

    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94b384"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>

    <linearGradient id="grad-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dba868"/>
      <stop offset="100%" stop-color="#9c6e2e"/>
    </linearGradient>

    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd7d75"/>
      <stop offset="100%" stop-color="#7d3f38"/>
    </linearGradient>

    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9384a5"/>
      <stop offset="100%" stop-color="#574a68"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000044"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#555555"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#3d5a7d"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#5a7a4d"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9c6e2e"/>
    </marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#7d3f38"/>
    </marker>
    <marker id="arrow-info" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#574a68"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#ffffff"/>
    </marker>
  </defs>
</svg>
