<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Arial, sans-serif" style="background:var(--bg)">
  <metadata>
    <type>regular</type>
  </metadata>
  <text x="640" y="40" text-anchor="middle" font-size="31.4476" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">DNS Amplification DDoS Attack</text>
  <rect x="40" y="163.4043" width="260.8696" height="197.4468" rx="6" fill="url(#grad-danger)" stroke="var(--danger-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="170.4348" y="249.7872" text-anchor="middle" font-size="24.4592" font-weight="bold" fill="var(--danger-accent)" font-family="Arial, sans-serif">Attacker</text>
  <text x="170.4348" y="311.4894" text-anchor="middle" font-size="19.2179" fill="var(--text-muted)" font-family="Arial, sans-serif">Spoofs src=victim IP</text>
  <rect x="492.1739" y="163.4043" width="295.6521" height="197.4468" rx="6" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="249.7872" text-anchor="middle" font-size="24.4592" font-weight="bold" fill="var(--danger-accent)" font-family="Arial, sans-serif">Open DNS Resolver</text>
  <text x="640" y="311.4894" text-anchor="middle" font-size="19.2179" fill="var(--text-muted)" font-family="Arial, sans-serif">Amplifies ~50x</text>
  <rect x="979.1304" y="163.4043" width="260.8696" height="197.4468" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="1109.5652" y="249.7872" text-anchor="middle" font-size="24.4592" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Victim</text>
  <text x="1109.5652" y="311.4894" text-anchor="middle" font-size="19.2179" fill="var(--text-muted)" font-family="Arial, sans-serif">Overwhelmed</text>
  <line x1="300.8696" y1="225.1064" x2="492.1739" y2="225.1064" stroke="var(--danger-border)" stroke-width="2" marker-end="url(#arrow-danger)"/>
  <text x="396.5218" y="205.3617" text-anchor="middle" font-size="17.4709" fill="var(--danger-accent)" font-family="Arial, sans-serif">Small query</text>
  <line x1="787.8261" y1="262.1277" x2="979.1304" y2="262.1277" stroke="var(--danger-border)" stroke-width="2" marker-end="url(#arrow-danger)"/>
  <text x="883.4782" y="242.383" text-anchor="middle" font-size="17.4709" fill="var(--danger-accent)" font-family="Arial, sans-serif">Huge response</text>
  <rect x="161.7392" y="459.5745" width="956.5218" height="160.4255" rx="6" fill="url(#grad-danger)" stroke="var(--danger-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="521.2766" text-anchor="middle" font-size="22.7122" fill="var(--text)" font-family="Arial, sans-serif">Attacker sends small DNS queries with victim's spoofed source IP.</text>
  <text x="640" y="578.0426" text-anchor="middle" font-size="22.7122" fill="var(--text)" font-family="Arial, sans-serif">DNS resolvers reply with much larger responses directly to the victim.</text>
  <defs>
    <style id="palette-vars">
      :root, svg {
        --bg: #ffffff;
        --surface: #c4cdd6;
        --border: #6b7280;
        --text: #212121;
        --text-muted: #555555;
        --text-faint: #888888;
        --code-bg: #1a1a2e;
        --shadow: #00000044;
        --black: #000000;
        --primary-fill: #5a7a9c;
        --primary-border: #3d5a7d;
        --primary-text: #ffffff;
        --primary-accent: #243b59;
        --ok-fill: #7a9a6a;
        --ok-border: #5a7a4d;
        --ok-text: #ffffff;
        --ok-accent: #385030;
        --warn-fill: #c8924a;
        --warn-border: #9c6e2e;
        --warn-text: #ffffff;
        --warn-accent: #5a3f12;
        --danger-fill: #a86058;
        --danger-border: #7d3f38;
        --danger-text: #ffffff;
        --danger-accent: #4a1f1a;
        --info-fill: #7c6a8e;
        --info-border: #574a68;
        --info-text: #ffffff;
        --info-accent: #2f253b;
      }
    </style>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7493b3"/>
      <stop offset="100%" stop-color="#3d5a7d"/>
    </linearGradient>

    <linearGradient id="grad-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4cdd6"/>
    </linearGradient>

    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94b384"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>

    <linearGradient id="grad-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dba868"/>
      <stop offset="100%" stop-color="#9c6e2e"/>
    </linearGradient>

    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd7d75"/>
      <stop offset="100%" stop-color="#7d3f38"/>
    </linearGradient>

    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9384a5"/>
      <stop offset="100%" stop-color="#574a68"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000044"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#555555"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#3d5a7d"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#5a7a4d"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9c6e2e"/>
    </marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#7d3f38"/>
    </marker>
    <marker id="arrow-info" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#574a68"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#ffffff"/>
    </marker>
  </defs>
</svg>
