<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Arial, sans-serif" style="background:var(--bg)">
  <metadata>
    <type>regular</type>
  </metadata>
  <text x="639.9999" y="40" text-anchor="middle" font-size="28.7231" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">TLS 1.3 Handshake</text>
  <rect x="40" y="61.2195" width="240" height="56.5854" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="160" y="96.5854" text-anchor="middle" font-size="22.3402" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Client</text>
  <line x1="160" y1="117.8048" x2="160" y2="570.4878" stroke="var(--primary-border)" stroke-width="2" stroke-dasharray="5.8851 5.8851"/>
  <rect x="1000" y="61.2195" width="240" height="56.5854" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="1120" y="96.5854" text-anchor="middle" font-size="22.3402" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Server</text>
  <line x1="1120" y1="117.8048" x2="1120" y2="570.4878" stroke="var(--ok-border)" stroke-width="2" stroke-dasharray="5.8851 5.8851"/>
  <line x1="160" y1="146.0975" x2="1120" y2="146.0975" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <text x="639.9999" y="139.0244" text-anchor="middle" font-size="19.1487" font-weight="bold" fill="var(--primary-accent)" font-family="Arial, sans-serif">ClientHello</text>
  <text x="639.9999" y="167.3171" text-anchor="middle" font-size="15.9572" fill="var(--text-muted)" font-family="Arial, sans-serif">TLS version, cipher suites, key share</text>
  <line x1="1120" y1="209.7561" x2="160" y2="209.7561" stroke="var(--ok-border)" stroke-width="2" marker-end="url(#arrow-ok)"/>
  <text x="639.9999" y="202.6829" text-anchor="middle" font-size="19.1487" font-weight="bold" fill="var(--ok-accent)" font-family="Arial, sans-serif">ServerHello</text>
  <text x="639.9999" y="230.9756" text-anchor="middle" font-size="15.9572" fill="var(--text-muted)" font-family="Arial, sans-serif">chosen cipher, key share</text>
  <line x1="1120" y1="266.3415" x2="160" y2="266.3415" stroke="var(--ok-border)" stroke-width="2" marker-end="url(#arrow-ok)"/>
  <text x="639.9999" y="259.2683" text-anchor="middle" font-size="19.1487" font-weight="bold" fill="var(--ok-accent)" font-family="Arial, sans-serif">EncryptedExtensions</text>
  <line x1="1120" y1="308.7805" x2="160" y2="308.7805" stroke="var(--ok-border)" stroke-width="2" marker-end="url(#arrow-ok)"/>
  <text x="639.9999" y="301.7073" text-anchor="middle" font-size="19.1487" font-weight="bold" fill="var(--ok-accent)" font-family="Arial, sans-serif">Certificate</text>
  <line x1="1120" y1="351.2195" x2="160" y2="351.2195" stroke="var(--ok-border)" stroke-width="2" marker-end="url(#arrow-ok)"/>
  <text x="639.9999" y="344.1463" text-anchor="middle" font-size="19.1487" font-weight="bold" fill="var(--ok-accent)" font-family="Arial, sans-serif">CertificateVerify</text>
  <line x1="1120" y1="393.6585" x2="160" y2="393.6585" stroke="var(--ok-border)" stroke-width="2" marker-end="url(#arrow-ok)"/>
  <text x="639.9999" y="386.5854" text-anchor="middle" font-size="19.1487" font-weight="bold" fill="var(--ok-accent)" font-family="Arial, sans-serif">Finished</text>
  <line x1="160" y1="450.2439" x2="1120" y2="450.2439" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <text x="639.9999" y="443.1708" text-anchor="middle" font-size="19.1487" font-weight="bold" fill="var(--primary-accent)" font-family="Arial, sans-serif">Finished</text>
  <rect x="112" y="492.6829" width="1056.0001" height="49.5122" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="639.9999" y="523.8049" text-anchor="middle" font-size="20.7444" font-weight="bold" fill="var(--ok-accent)" font-family="Arial, sans-serif">Encrypted Application Data</text>
  <rect x="160" y="570.4878" width="960" height="49.5122" rx="6" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="639.9999" y="601.6098" text-anchor="middle" font-size="19.1487" fill="var(--danger-accent)" font-weight="bold" font-family="Arial, sans-serif">1 round trip (vs 2 in TLS 1.2), 0-RTT on reconnect</text>
  <defs>
    <style id="palette-vars">
      :root, svg {
        --bg: #ffffff;
        --surface: #c4cdd6;
        --border: #6b7280;
        --text: #212121;
        --text-muted: #555555;
        --text-faint: #888888;
        --code-bg: #1a1a2e;
        --shadow: #00000044;
        --black: #000000;
        --primary-fill: #5a7a9c;
        --primary-border: #3d5a7d;
        --primary-text: #ffffff;
        --primary-accent: #243b59;
        --ok-fill: #7a9a6a;
        --ok-border: #5a7a4d;
        --ok-text: #ffffff;
        --ok-accent: #385030;
        --warn-fill: #c8924a;
        --warn-border: #9c6e2e;
        --warn-text: #ffffff;
        --warn-accent: #5a3f12;
        --danger-fill: #a86058;
        --danger-border: #7d3f38;
        --danger-text: #ffffff;
        --danger-accent: #4a1f1a;
        --info-fill: #7c6a8e;
        --info-border: #574a68;
        --info-text: #ffffff;
        --info-accent: #2f253b;
      }
    </style>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7493b3"/>
      <stop offset="100%" stop-color="#3d5a7d"/>
    </linearGradient>

    <linearGradient id="grad-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4cdd6"/>
    </linearGradient>

    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94b384"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>

    <linearGradient id="grad-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dba868"/>
      <stop offset="100%" stop-color="#9c6e2e"/>
    </linearGradient>

    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd7d75"/>
      <stop offset="100%" stop-color="#7d3f38"/>
    </linearGradient>

    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9384a5"/>
      <stop offset="100%" stop-color="#574a68"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000044"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#555555"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#3d5a7d"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#5a7a4d"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9c6e2e"/>
    </marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#7d3f38"/>
    </marker>
    <marker id="arrow-info" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#574a68"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#ffffff"/>
    </marker>
  </defs>
</svg>
