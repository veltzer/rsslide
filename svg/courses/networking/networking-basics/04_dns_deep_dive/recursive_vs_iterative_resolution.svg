<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="sans-serif" style="background:var(--bg)">
  <metadata>
    <type>regular</type>
  </metadata>
  <defs>
    <style id="palette-vars">
      :root, svg {
        --bg: #ffffff;
        --surface: #c4cdd6;
        --border: #6b7280;
        --text: #212121;
        --text-muted: #555555;
        --text-faint: #888888;
        --code-bg: #1a1a2e;
        --shadow: #00000044;
        --black: #000000;
        --primary-fill: #5a7a9c;
        --primary-border: #3d5a7d;
        --primary-text: #ffffff;
        --primary-accent: #243b59;
        --ok-fill: #7a9a6a;
        --ok-border: #5a7a4d;
        --ok-text: #ffffff;
        --ok-accent: #385030;
        --warn-fill: #c8924a;
        --warn-border: #9c6e2e;
        --warn-text: #ffffff;
        --warn-accent: #5a3f12;
        --danger-fill: #a86058;
        --danger-border: #7d3f38;
        --danger-text: #ffffff;
        --danger-accent: #4a1f1a;
        --info-fill: #7c6a8e;
        --info-border: #574a68;
        --info-text: #ffffff;
        --info-accent: #2f253b;
      }
    </style>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7493b3"/>
      <stop offset="100%" stop-color="#3d5a7d"/>
    </linearGradient>

    <linearGradient id="grad-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4cdd6"/>
    </linearGradient>

    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94b384"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>

    <linearGradient id="grad-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dba868"/>
      <stop offset="100%" stop-color="#9c6e2e"/>
    </linearGradient>

    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd7d75"/>
      <stop offset="100%" stop-color="#7d3f38"/>
    </linearGradient>

    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9384a5"/>
      <stop offset="100%" stop-color="#574a68"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000044"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#555555"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#3d5a7d"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#5a7a4d"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9c6e2e"/>
    </marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#7d3f38"/>
    </marker>
    <marker id="arrow-info" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#574a68"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#ffffff"/>
    </marker>
  </defs>
  <rect x="40" y="40" width="169.9114" height="334.6151" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="124.9557" y="190.577" font-size="30.8708" fill="var(--text)" text-anchor="middle" font-family="Arial, sans-serif">Client</text>
  <rect x="263.0089" y="40" width="276.1062" height="334.6151" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="401.0619" y="173.8462" font-size="30.8708" fill="var(--text)" text-anchor="middle" font-family="Arial, sans-serif">Recursive</text>
  <text x="401.0619" y="263.077" font-size="30.8708" fill="var(--text)" text-anchor="middle" font-family="Arial, sans-serif">Resolver</text>
  <text x="401.0619" y="352.3077" font-size="25.7255" fill="var(--text-muted)" text-anchor="middle" font-family="Arial, sans-serif">(ISP/8.8.8.8)</text>
  <rect x="602.8318" y="40" width="148.6726" height="334.6151" rx="6" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="677.1681" y="229.6155" font-size="30.8708" fill="var(--text)" text-anchor="middle" font-family="Arial, sans-serif">Root</text>
  <rect x="804.6018" y="40" width="148.6726" height="334.6151" rx="6" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="878.938" y="190.577" font-size="30.8708" fill="var(--text)" text-anchor="middle" font-family="Arial, sans-serif">.com</text>
  <text x="878.938" y="279.8077" font-size="30.8708" fill="var(--text)" text-anchor="middle" font-family="Arial, sans-serif">NS</text>
  <rect x="1006.3717" y="40" width="233.6283" height="334.6151" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="1123.1858" y="173.8462" font-size="30.8708" fill="var(--text)" text-anchor="middle" font-family="Arial, sans-serif">Authoritative</text>
  <text x="1123.1858" y="263.077" font-size="30.8708" fill="var(--text)" text-anchor="middle" font-family="Arial, sans-serif">NS</text>
  <line x1="209.9114" y1="140.3847" x2="258.761" y2="140.3847" stroke="var(--text-muted)" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="539.1149" y1="140.3847" x2="598.5839" y2="140.3847" stroke="var(--text-muted)" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="751.5043" y1="140.3847" x2="800.3539" y2="140.3847" stroke="var(--text-muted)" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="953.2743" y1="140.3847" x2="1002.1238" y2="140.3847" stroke="var(--text-muted)" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="258.761" y1="274.2308" x2="209.9114" y2="274.2308" stroke="var(--text-muted)" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="598.5839" y1="274.2308" x2="539.1149" y2="274.2308" stroke="var(--text-muted)" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="800.3539" y1="274.2308" x2="751.5043" y2="274.2308" stroke="var(--text-muted)" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1002.1238" y1="274.2308" x2="953.2743" y2="274.2308" stroke="var(--text-muted)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="124.9557" y="541.923" font-size="28.2981" fill="var(--text-muted)" text-anchor="middle" font-family="Arial, sans-serif">Single</text>
  <text x="124.9557" y="620" font-size="28.2981" fill="var(--text-muted)" text-anchor="middle" font-family="Arial, sans-serif">query</text>
  <text x="401.0619" y="541.923" font-size="28.2981" fill="var(--text-muted)" text-anchor="middle" font-family="Arial, sans-serif">Does all</text>
  <text x="401.0619" y="620" font-size="28.2981" fill="var(--text-muted)" text-anchor="middle" font-family="Arial, sans-serif">the work</text>
  <text x="942.6548" y="541.923" font-size="28.2981" fill="var(--text-muted)" text-anchor="middle" font-family="Arial, sans-serif">Iterative queries to each level</text>
</svg>
