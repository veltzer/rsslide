  <text x="879.7941" y="415.84" font-size="25.9592" fill="var(--text)" text-anchor="middle" font-family="Arial, sans-serif">bbc</text>
  <line x1="87.3413" y1="425.12" x2="40" y2="587.52" stroke="var(--text-muted)" stroke-width="2"/>
  <line x1="87.3413" y1="425.12" x2="159.3824" y2="587.52" stroke="var(--text-muted)" stroke-width="2"/>
  <line x1="262.2984" y1="425.12" x2="278.765" y2="587.52" stroke="var(--text-muted)" stroke-width="2"/>
  <line x1="879.7941" y1="425.12" x2="879.7941" y2="587.52" stroke="var(--text-muted)" stroke-width="2"/>
  <text x="40" y="620" font-size="25.9592" fill="var(--text)" text-anchor="middle" font-family="Arial, sans-serif">www</text>
  <text x="159.3824" y="620" font-size="25.9592" fill="var(--text)" text-anchor="middle" font-family="Arial, sans-serif">mail</text>
  <text x="278.765" y="620" font-size="25.9592" fill="var(--text)" text-anchor="middle" font-family="Arial, sans-serif">www</text>
  <text x="879.7941" y="620" font-size="25.9592" fill="var(--text)" text-anchor="middle" font-family="Arial, sans-serif">www</text>
</svg>
