  <text x="190.2572" y="207.04" font-size="25.9592" fill="var(--text)" text-anchor="middle" font-family="Arial, sans-serif">.com</text>
  <text x="396.0892" y="207.04" font-size="25.9592" fill="var(--text)" text-anchor="middle" font-family="Arial, sans-serif">.org</text>
  <text x="601.9211" y="207.04" font-size="25.9592" fill="var(--text)" text-anchor="middle" font-family="Arial, sans-serif">.net</text>
  <text x="879.7941" y="207.04" font-size="25.9592" fill="var(--text)" text-anchor="middle" font-family="Arial, sans-serif">.uk</text>
