  <text x="1240" y="207.04" font-size="25.9592" fill="var(--text)" text-anchor="middle" font-family="Arial, sans-serif">...</text>
  <line x1="190.2572" y1="216.3199" x2="87.3413" y2="385.68" stroke="var(--text-muted)" stroke-width="2"/>
  <line x1="190.2572" y1="216.3199" x2="262.2984" y2="385.68" stroke="var(--text-muted)" stroke-width="2"/>
  <line x1="190.2572" y1="216.3199" x2="437.2555" y2="385.68" stroke="var(--text-muted)" stroke-width="2"/>
  <line x1="879.7941" y1="216.3199" x2="879.7941" y2="385.68" stroke="var(--text-muted)" stroke-width="2"/>
  <text x="87.3413" y="415.84" font-size="25.9592" fill="var(--text)" text-anchor="middle" font-family="Arial, sans-serif">google</text>
