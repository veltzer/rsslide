<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" style="background:var(--bg)">
  <metadata>
    <type>regular</type>
  </metadata>
  <defs>
    <style id="palette-vars">
      :root, svg {
        --bg: #ffffff;
        --surface: #c4cdd6;
        --border: #6b7280;
        --text: #212121;
        --text-muted: #555555;
        --text-faint: #888888;
        --code-bg: #1a1a2e;
        --shadow: #00000044;
        --black: #000000;
        --primary-fill: #5a7a9c;
        --primary-border: #3d5a7d;
        --primary-text: #ffffff;
        --primary-accent: #243b59;
        --ok-fill: #7a9a6a;
        --ok-border: #5a7a4d;
        --ok-text: #ffffff;
        --ok-accent: #385030;
        --warn-fill: #c8924a;
        --warn-border: #9c6e2e;
        --warn-text: #ffffff;
        --warn-accent: #5a3f12;
        --danger-fill: #a86058;
        --danger-border: #7d3f38;
        --danger-text: #ffffff;
        --danger-accent: #4a1f1a;
        --info-fill: #7c6a8e;
        --info-border: #574a68;
        --info-text: #ffffff;
        --info-accent: #2f253b;
      }
    </style>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7493b3"/>
      <stop offset="100%" stop-color="#3d5a7d"/>
    </linearGradient>

    <linearGradient id="grad-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4cdd6"/>
    </linearGradient>

    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94b384"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>

    <linearGradient id="grad-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dba868"/>
      <stop offset="100%" stop-color="#9c6e2e"/>
    </linearGradient>

    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd7d75"/>
      <stop offset="100%" stop-color="#7d3f38"/>
    </linearGradient>

    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9384a5"/>
      <stop offset="100%" stop-color="#574a68"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000044"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#555555"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#3d5a7d"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#5a7a4d"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9c6e2e"/>
    </marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#7d3f38"/>
    </marker>
    <marker id="arrow-info" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#574a68"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#ffffff"/>
    </marker>
  </defs>

  <rect x="40" y="40" width="1200" height="70" rx="6" fill="var(--surface)" stroke="var(--border)" stroke-width="2"/>
  <text x="640" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="var(--text)">MX Records: Where Email for a Domain Goes</text>

  <rect x="40" y="150" width="320" height="180" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="200" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="var(--primary-text)">Sending MTA</text>
  <text x="200" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="var(--primary-text)">Needs to deliver mail</text>
  <text x="200" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="var(--primary-text)">to user@example.com</text>

  <line x1="360" y1="240" x2="480" y2="240" stroke="var(--text-muted)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="420" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="var(--text-muted)">MX query</text>

  <rect x="480" y="150" width="320" height="180" rx="6" fill="url(#grad-info)" stroke="var(--info-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="var(--info-text)">DNS Resolver</text>
  <text x="640" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="var(--info-text)">Looks up MX records</text>
  <text x="640" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="var(--info-text)">for example.com zone</text>

  <line x1="800" y1="240" x2="920" y2="240" stroke="var(--text-muted)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="860" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="var(--text-muted)">sorted list</text>

  <rect x="920" y="150" width="320" height="180" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="1080" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="var(--ok-text)">Receiving MTA</text>
  <text x="1080" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="var(--ok-text)">Lowest priority picked</text>
  <text x="1080" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="var(--ok-text)">SMTP connection opens</text>

  <rect x="40" y="360" width="1200" height="260" rx="6" fill="var(--surface)" stroke="var(--border)" stroke-width="2"/>
  <text x="640" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="var(--text)">MX Record Priorities for example.com</text>

  <rect x="80" y="440" width="360" height="150" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="260" y="485" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="var(--ok-text)">Priority 10</text>
  <text x="260" y="525" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="var(--ok-text)">mail1.example.com</text>
  <text x="260" y="565" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="var(--ok-text)">tried first</text>

  <rect x="460" y="440" width="360" height="150" rx="6" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="485" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="var(--warn-text)">Priority 20</text>
  <text x="640" y="525" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="var(--warn-text)">mail2.example.com</text>
  <text x="640" y="565" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="var(--warn-text)">fallback</text>

  <rect x="840" y="440" width="360" height="150" rx="6" fill="url(#grad-danger)" stroke="var(--danger-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="1020" y="485" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="var(--danger-text)">Priority 30</text>
  <text x="1020" y="525" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="var(--danger-text)">mail3.example.com</text>
  <text x="1020" y="565" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="var(--danger-text)">last resort</text>
</svg>
