<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" style="background:var(--bg)">
  <metadata>
    <type>regular</type>
  </metadata>
  <defs>
    <style id="palette-vars">
      :root, svg {
        --bg: #ffffff;
        --surface: #c4cdd6;
        --border: #6b7280;
        --text: #212121;
        --text-muted: #555555;
        --text-faint: #888888;
        --code-bg: #1a1a2e;
        --shadow: #00000044;
        --black: #000000;
        --primary-fill: #5a7a9c;
        --primary-border: #3d5a7d;
        --primary-text: #ffffff;
        --primary-accent: #243b59;
        --ok-fill: #7a9a6a;
        --ok-border: #5a7a4d;
        --ok-text: #ffffff;
        --ok-accent: #385030;
        --warn-fill: #c8924a;
        --warn-border: #9c6e2e;
        --warn-text: #ffffff;
        --warn-accent: #5a3f12;
        --danger-fill: #a86058;
        --danger-border: #7d3f38;
        --danger-text: #ffffff;
        --danger-accent: #4a1f1a;
        --info-fill: #7c6a8e;
        --info-border: #574a68;
        --info-text: #ffffff;
        --info-accent: #2f253b;
      }
    </style>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7493b3"/>
      <stop offset="100%" stop-color="#3d5a7d"/>
    </linearGradient>

    <linearGradient id="grad-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4cdd6"/>
    </linearGradient>

    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94b384"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>

    <linearGradient id="grad-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dba868"/>
      <stop offset="100%" stop-color="#9c6e2e"/>
    </linearGradient>

    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd7d75"/>
      <stop offset="100%" stop-color="#7d3f38"/>
    </linearGradient>

    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9384a5"/>
      <stop offset="100%" stop-color="#574a68"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000044"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#555555"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#3d5a7d"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#5a7a4d"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9c6e2e"/>
    </marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#7d3f38"/>
    </marker>
    <marker id="arrow-info" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#574a68"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#ffffff"/>
    </marker>
  </defs>
<text x="640" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="26.579136" font-weight="bold" fill="var(--text)">How CNAME Records Resolve</text>
<rect x="40" y="76.576577" width="380" height="418.018018" rx="6.133647" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
<text x="230" y="243.783784" text-anchor="middle" font-family="Arial, sans-serif" font-size="28.623685" font-weight="bold" fill="var(--primary-text)">www.example.com</text>
<text x="230" y="306.486486" text-anchor="middle" font-family="Arial, sans-serif" font-size="22.490038" fill="var(--primary-text)">alias name</text>
<text x="230" y="358.738739" text-anchor="middle" font-family="Arial, sans-serif" font-size="20.445489" fill="var(--primary-text)">(CNAME)</text>
<rect x="440" y="76.576577" width="380" height="418.018018" rx="6.133647" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
<text x="630" y="243.783784" text-anchor="middle" font-family="Arial, sans-serif" font-size="28.623685" font-weight="bold" fill="var(--warn-text)">example.com</text>
<text x="630" y="306.486486" text-anchor="middle" font-family="Arial, sans-serif" font-size="22.490038" fill="var(--warn-text)">canonical name</text>
<text x="630" y="358.738739" text-anchor="middle" font-family="Arial, sans-serif" font-size="20.445489" fill="var(--warn-text)">(A record target)</text>
<rect x="840" y="76.576577" width="380" height="418.018018" rx="6.133647" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
<text x="1030" y="243.783784" text-anchor="middle" font-family="Arial, sans-serif" font-size="28.623685" font-weight="bold" fill="var(--ok-text)">93.184.216.34</text>
<text x="1030" y="306.486486" text-anchor="middle" font-family="Arial, sans-serif" font-size="22.490038" fill="var(--ok-text)">IPv4 address</text>
<text x="1030" y="358.738739" text-anchor="middle" font-family="Arial, sans-serif" font-size="20.445489" fill="var(--ok-text)">(final answer)</text>
<line x1="420" y1="285.585586" x2="440" y2="285.585586" stroke="var(--text)" stroke-width="3" marker-end="url(#arrow)"/>
<text x="430" y="254.234234" text-anchor="middle" font-family="Arial, sans-serif" font-size="22.490038" font-weight="bold" fill="var(--text)">CNAME</text>
<line x1="820" y1="285.585586" x2="840" y2="285.585586" stroke="var(--text)" stroke-width="3" marker-end="url(#arrow)"/>
<text x="830" y="254.234234" text-anchor="middle" font-family="Arial, sans-serif" font-size="22.490038" font-weight="bold" fill="var(--text)">A</text>
<rect x="40" y="525.945946" width="1200" height="94.054054" rx="6.133647" fill="var(--surface)" stroke="var(--border)" stroke-width="2"/>
<text x="640" y="567.747748" text-anchor="middle" font-family="Arial, sans-serif" font-size="22.490038" font-weight="bold" fill="var(--text)">Resolver chases each CNAME until it hits an A or AAAA record.</text>
<text x="640" y="601.189189" text-anchor="middle" font-family="Arial, sans-serif" font-size="18.40094" fill="var(--text-muted)">Each hop is an extra DNS lookup, so deep chains slow resolution.</text>
</svg>
