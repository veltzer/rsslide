<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="sans-serif" style="background:var(--bg)">
  <metadata>
    <type>regular</type>
  </metadata>
  <defs>
    <style id="palette-vars">
      :root, svg {
        --bg: #ffffff;
        --surface: #c4cdd6;
        --border: #6b7280;
        --text: #212121;
        --text-muted: #555555;
        --text-faint: #888888;
        --code-bg: #1a1a2e;
        --shadow: #00000044;
        --black: #000000;
        --primary-fill: #5a7a9c;
        --primary-border: #3d5a7d;
        --primary-text: #ffffff;
        --primary-accent: #243b59;
        --ok-fill: #7a9a6a;
        --ok-border: #5a7a4d;
        --ok-text: #ffffff;
        --ok-accent: #385030;
        --warn-fill: #c8924a;
        --warn-border: #9c6e2e;
        --warn-text: #ffffff;
        --warn-accent: #5a3f12;
        --danger-fill: #a86058;
        --danger-border: #7d3f38;
        --danger-text: #ffffff;
        --danger-accent: #4a1f1a;
        --info-fill: #7c6a8e;
        --info-border: #574a68;
        --info-text: #ffffff;
        --info-accent: #2f253b;
      }
    </style>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7493b3"/>
      <stop offset="100%" stop-color="#3d5a7d"/>
    </linearGradient>

    <linearGradient id="grad-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4cdd6"/>
    </linearGradient>

    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94b384"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>

    <linearGradient id="grad-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dba868"/>
      <stop offset="100%" stop-color="#9c6e2e"/>
    </linearGradient>

    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd7d75"/>
      <stop offset="100%" stop-color="#7d3f38"/>
    </linearGradient>

    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9384a5"/>
      <stop offset="100%" stop-color="#574a68"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000044"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#555555"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#3d5a7d"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#5a7a4d"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9c6e2e"/>
    </marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#7d3f38"/>
    </marker>
    <marker id="arrow-info" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#574a68"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#ffffff"/>
    </marker>
  </defs>
  <text x="40" y="40" font-size="30.5028" fill="var(--danger-accent)" font-weight="bold" font-family="Arial, sans-serif">Without DNSSEC:</text>
  <rect x="40" y="69" width="200" height="120.8334" rx="6" fill="url(#grad-danger)" stroke="var(--danger-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="140.0001" y="141.5" font-size="28.3239" fill="var(--text)" text-anchor="middle" font-family="Arial, sans-serif">Client</text>
  <rect x="506.6667" y="69" width="222.2222" height="120.8334" rx="6" fill="url(#grad-danger)" stroke="var(--danger-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="617.7778" y="141.5" font-size="28.3239" fill="var(--text)" text-anchor="middle" font-family="Arial, sans-serif">Resolver</text>
  <rect x="995.5555" y="69" width="200" height="120.8334" rx="6" fill="url(#grad-danger)" stroke="var(--danger-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="1095.5556" y="141.5" font-size="28.3239" fill="var(--text)" text-anchor="middle" font-family="Arial, sans-serif">NS</text>
  <line x1="240" y1="107.6666" x2="502.2222" y2="107.6666" stroke="var(--text-muted)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="373.3333" y="95.5834" font-size="23.9664" fill="var(--text-muted)" text-anchor="middle" font-family="Arial, sans-serif">Query</text>
  <line x1="995.5555" y1="107.6666" x2="733.3333" y2="107.6666" stroke="var(--text-muted)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="862.2222" y="95.5834" font-size="23.9664" fill="var(--text-muted)" text-anchor="middle" font-family="Arial, sans-serif">Response</text>
  <line x1="506.6667" y1="165.6666" x2="244.4445" y2="165.6666" stroke="var(--text-muted)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="377.7778" y="204.3332" font-size="23.9664" fill="var(--text-muted)" text-anchor="middle" font-family="Arial, sans-serif">Response</text>
  <rect x="440" y="240.5832" width="444.4444" height="106.3334" rx="6" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="662.2222" y="286.4999" font-size="26.1452" fill="var(--danger-accent)" text-anchor="middle" font-family="Arial, sans-serif">⚠ Attacker can forge</text>
  <text x="662.2222" y="325.1666" font-size="26.1452" fill="var(--danger-accent)" text-anchor="middle" font-family="Arial, sans-serif">responses (DNS spoofing)</text>
  <line x1="617.7778" y1="189.8332" x2="617.7778" y2="238.1666" stroke="var(--warn-border)" stroke-width="2" marker-end="url(#arrow-warn)"/>
  <text x="40" y="436.3332" font-size="30.5028" fill="var(--ok-accent)" font-weight="bold" font-family="Arial, sans-serif">With DNSSEC:</text>
  <rect x="40" y="465.3334" width="200" height="120.8334" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="140.0001" y="537.8332" font-size="28.3239" fill="var(--text)" text-anchor="middle" font-family="Arial, sans-serif">Client</text>
  <rect x="462.2222" y="465.3334" width="288.8889" height="144.9999" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="606.6667" y="523.3332" font-size="28.3239" fill="var(--text)" text-anchor="middle" font-family="Arial, sans-serif">Resolver</text>
  <text x="606.6667" y="566.8334" font-size="23.9664" fill="var(--ok-accent)" text-anchor="middle" font-family="Arial, sans-serif">Validates signature</text>
  <rect x="1017.7778" y="465.3334" width="222.2222" height="144.9999" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="1128.8889" y="523.3332" font-size="28.3239" fill="var(--text)" text-anchor="middle" font-family="Arial, sans-serif">NS</text>
  <text x="1128.8889" y="566.8334" font-size="23.9664" fill="var(--ok-accent)" text-anchor="middle" font-family="Arial, sans-serif">Signs records</text>
  <line x1="240" y1="503.9999" x2="457.7777" y2="503.9999" stroke="var(--text-muted)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="348.8889" y="491.9166" font-size="23.9664" fill="var(--text-muted)" text-anchor="middle" font-family="Arial, sans-serif">Query</text>
  <line x1="1017.7778" y1="503.9999" x2="755.5556" y2="503.9999" stroke="var(--text-muted)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="884.4444" y="491.9166" font-size="23.9664" fill="var(--text-muted)" text-anchor="middle" font-family="Arial, sans-serif">Signed Response</text>
  <line x1="462.2222" y1="576.4999" x2="244.4445" y2="576.4999" stroke="var(--text-muted)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="353.3334" y="620" font-size="23.9664" fill="var(--ok-accent)" text-anchor="middle" font-family="Arial, sans-serif">Verified Response</text>
</svg>
