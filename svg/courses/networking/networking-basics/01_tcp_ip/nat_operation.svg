<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" style="background:var(--bg)">
  <metadata>
    <type>regular</type>
  </metadata>
  <defs>
    <style id="palette-vars">
      :root, svg {
        --bg: #ffffff;
        --surface: #c4cdd6;
        --border: #6b7280;
        --text: #212121;
        --text-muted: #555555;
        --text-faint: #888888;
        --code-bg: #1a1a2e;
        --shadow: #00000044;
        --black: #000000;
        --primary-fill: #5a7a9c;
        --primary-border: #3d5a7d;
        --primary-text: #ffffff;
        --primary-accent: #243b59;
        --ok-fill: #7a9a6a;
        --ok-border: #5a7a4d;
        --ok-text: #ffffff;
        --ok-accent: #385030;
        --warn-fill: #c8924a;
        --warn-border: #9c6e2e;
        --warn-text: #ffffff;
        --warn-accent: #5a3f12;
        --danger-fill: #a86058;
        --danger-border: #7d3f38;
        --danger-text: #ffffff;
        --danger-accent: #4a1f1a;
        --info-fill: #7c6a8e;
        --info-border: #574a68;
        --info-text: #ffffff;
        --info-accent: #2f253b;
      }
    </style>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7493b3"/>
      <stop offset="100%" stop-color="#3d5a7d"/>
    </linearGradient>

    <linearGradient id="grad-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4cdd6"/>
    </linearGradient>

    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94b384"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>

    <linearGradient id="grad-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dba868"/>
      <stop offset="100%" stop-color="#9c6e2e"/>
    </linearGradient>

    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd7d75"/>
      <stop offset="100%" stop-color="#7d3f38"/>
    </linearGradient>

    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9384a5"/>
      <stop offset="100%" stop-color="#574a68"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000044"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#555555"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#3d5a7d"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#5a7a4d"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9c6e2e"/>
    </marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#7d3f38"/>
    </marker>
    <marker id="arrow-info" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#574a68"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#ffffff"/>
    </marker>
  </defs>
  <text x="179.2856" y="40" text-anchor="middle" font-size="23.9782" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Private Network</text>
  <rect x="40" y="77.4194" width="257.1428" height="130.9677" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="168.5714" y="141.0323" text-anchor="middle" font-size="21.7983" font-family="Arial, sans-serif" fill="var(--primary-text)">PC1: 192.168.1.10</text>
  <text x="168.5714" y="189.6774" text-anchor="middle" font-size="21.7983" font-family="Arial, sans-serif" fill="var(--primary-text)">:3000</text>
  <rect x="40" y="245.8065" width="257.1428" height="130.9677" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="168.5714" y="309.4194" text-anchor="middle" font-size="21.7983" font-family="Arial, sans-serif" fill="var(--primary-text)">PC2: 192.168.1.11</text>
  <text x="168.5714" y="358.0645" text-anchor="middle" font-size="21.7983" font-family="Arial, sans-serif" fill="var(--primary-text)">:4000</text>
  <rect x="40" y="414.1935" width="257.1428" height="130.9677" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="168.5714" y="477.8065" text-anchor="middle" font-size="21.7983" font-family="Arial, sans-serif" fill="var(--primary-text)">PC3: 192.168.1.12</text>
  <text x="168.5714" y="526.4516" text-anchor="middle" font-size="21.7983" font-family="Arial, sans-serif" fill="var(--primary-text)">:5000</text>
  <rect x="468.5713" y="189.6774" width="300" height="261.9355" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="618.5714" y="283.2258" text-anchor="middle" font-size="26.158" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">NAT Router</text>
  <text x="618.5714" y="339.3548" text-anchor="middle" font-size="21.7983" fill="var(--text-muted)" font-family="Arial, sans-serif">Translation Table</text>
  <text x="618.5714" y="395.4839" text-anchor="middle" font-size="21.7983" fill="var(--text-muted)" font-family="Arial, sans-serif">Public: 203.0.113.5</text>
  <rect x="940" y="189.6774" width="300" height="261.9355" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="1089.9999" y="283.2258" text-anchor="middle" font-size="26.158" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Internet</text>
  <text x="1089.9999" y="339.3548" text-anchor="middle" font-size="23.9782" fill="var(--text-muted)" font-family="Arial, sans-serif">Web Server</text>
  <text x="1089.9999" y="395.4839" text-anchor="middle" font-size="21.7983" fill="var(--text-muted)" font-family="Arial, sans-serif">93.184.216.34</text>
  <line x1="297.1428" y1="152.2581" x2="468.5713" y2="264.5161" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <line x1="297.1428" y1="309.4194" x2="468.5713" y2="320.6452" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <line x1="297.1428" y1="477.8065" x2="468.5713" y2="376.7742" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <line x1="768.5714" y1="320.6452" x2="940" y2="320.6452" stroke="var(--ok-border)" stroke-width="2" marker-end="url(#arrow-ok)"/>
  <text x="639.9999" y="620" text-anchor="middle" font-size="21.7983" fill="var(--text-muted)" font-family="Arial, sans-serif">All outbound traffic appears as 203.0.113.5 to external servers</text>
</svg>
