<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Arial, sans-serif" style="background:var(--bg)">
  <metadata>
    <type>regular</type>
  </metadata>
  <defs>
    <style id="palette-vars">
      :root, svg {
        --bg: #ffffff;
        --surface: #c4cdd6;
        --border: #6b7280;
        --text: #212121;
        --text-muted: #555555;
        --text-faint: #888888;
        --code-bg: #1a1a2e;
        --shadow: #00000044;
        --black: #000000;
        --primary-fill: #5a7a9c;
        --primary-border: #3d5a7d;
        --primary-text: #ffffff;
        --primary-accent: #243b59;
        --ok-fill: #7a9a6a;
        --ok-border: #5a7a4d;
        --ok-text: #ffffff;
        --ok-accent: #385030;
        --warn-fill: #c8924a;
        --warn-border: #9c6e2e;
        --warn-text: #ffffff;
        --warn-accent: #5a3f12;
        --danger-fill: #a86058;
        --danger-border: #7d3f38;
        --danger-text: #ffffff;
        --danger-accent: #4a1f1a;
        --info-fill: #7c6a8e;
        --info-border: #574a68;
        --info-text: #ffffff;
        --info-accent: #2f253b;
      }
    </style>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7493b3"/>
      <stop offset="100%" stop-color="#3d5a7d"/>
    </linearGradient>

    <linearGradient id="grad-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4cdd6"/>
    </linearGradient>

    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94b384"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>

    <linearGradient id="grad-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dba868"/>
      <stop offset="100%" stop-color="#9c6e2e"/>
    </linearGradient>

    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd7d75"/>
      <stop offset="100%" stop-color="#7d3f38"/>
    </linearGradient>

    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9384a5"/>
      <stop offset="100%" stop-color="#574a68"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000044"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#555555"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#3d5a7d"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#5a7a4d"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9c6e2e"/>
    </marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#7d3f38"/>
    </marker>
    <marker id="arrow-info" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#574a68"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#ffffff"/>
    </marker>
  </defs>
  <rect x="40" y="40" width="1200" height="110" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="90" text-anchor="middle" font-size="30" font-weight="bold" fill="var(--primary-text)" font-family="Arial, sans-serif">IP Header</text>
  <text x="640" y="130" text-anchor="middle" font-size="18" fill="var(--primary-text)" font-family="Arial, sans-serif">Version, TTL, Protocol, Checksum, Length</text>

  <rect x="40" y="170" width="590" height="140" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="335" y="225" text-anchor="middle" font-size="28" font-weight="bold" fill="var(--ok-text)" font-family="Arial, sans-serif">Source IP</text>
  <text x="335" y="265" text-anchor="middle" font-size="18" fill="var(--ok-text)" font-family="Arial, sans-serif">32-bit address of sender</text>
  <text x="335" y="293" text-anchor="middle" font-size="18" fill="var(--ok-text)" font-family="Arial, sans-serif">e.g. 192.168.1.10</text>

  <rect x="650" y="170" width="590" height="140" rx="6" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="945" y="225" text-anchor="middle" font-size="28" font-weight="bold" fill="var(--warn-text)" font-family="Arial, sans-serif">Destination IP</text>
  <text x="945" y="265" text-anchor="middle" font-size="18" fill="var(--warn-text)" font-family="Arial, sans-serif">32-bit address of receiver</text>
  <text x="945" y="293" text-anchor="middle" font-size="18" fill="var(--warn-text)" font-family="Arial, sans-serif">routed hop by hop</text>

  <rect x="40" y="330" width="1200" height="290" rx="6" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
  <text x="640" y="385" text-anchor="middle" font-size="28" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Payload Data</text>
  <text x="640" y="435" text-anchor="middle" font-size="20" fill="var(--text-muted)" font-family="Arial, sans-serif">Upper-layer segment: TCP, UDP, or ICMP</text>
  <text x="640" y="475" text-anchor="middle" font-size="18" fill="var(--text-muted)" font-family="Arial, sans-serif">MTU typically 1500 bytes on Ethernet</text>
  <text x="640" y="515" text-anchor="middle" font-size="18" fill="var(--text-muted)" font-family="Arial, sans-serif">Fragmented if larger than the path MTU</text>
  <text x="640" y="555" text-anchor="middle" font-size="18" fill="var(--text-muted)" font-family="Arial, sans-serif">Routers inspect headers, never the payload</text>
  <text x="640" y="595" text-anchor="middle" font-size="18" fill="var(--text-muted)" font-family="Arial, sans-serif">End hosts reassemble and deliver</text>
</svg>
