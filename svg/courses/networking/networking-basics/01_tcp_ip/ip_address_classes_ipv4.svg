<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" style="background:var(--bg)">
  <metadata>
    <type>regular</type>
  </metadata>
  <defs>
    <style id="palette-vars">
      :root, svg {
        --bg: #ffffff;
        --surface: #c4cdd6;
        --border: #6b7280;
        --text: #212121;
        --text-muted: #555555;
        --text-faint: #888888;
        --code-bg: #1a1a2e;
        --shadow: #00000044;
        --black: #000000;
        --primary-fill: #5a7a9c;
        --primary-border: #3d5a7d;
        --primary-text: #ffffff;
        --primary-accent: #243b59;
        --ok-fill: #7a9a6a;
        --ok-border: #5a7a4d;
        --ok-text: #ffffff;
        --ok-accent: #385030;
        --warn-fill: #c8924a;
        --warn-border: #9c6e2e;
        --warn-text: #ffffff;
        --warn-accent: #5a3f12;
        --danger-fill: #a86058;
        --danger-border: #7d3f38;
        --danger-text: #ffffff;
        --danger-accent: #4a1f1a;
        --info-fill: #7c6a8e;
        --info-border: #574a68;
        --info-text: #ffffff;
        --info-accent: #2f253b;
      }
    </style>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7493b3"/>
      <stop offset="100%" stop-color="#3d5a7d"/>
    </linearGradient>

    <linearGradient id="grad-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4cdd6"/>
    </linearGradient>

    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94b384"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>

    <linearGradient id="grad-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dba868"/>
      <stop offset="100%" stop-color="#9c6e2e"/>
    </linearGradient>

    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd7d75"/>
      <stop offset="100%" stop-color="#7d3f38"/>
    </linearGradient>

    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9384a5"/>
      <stop offset="100%" stop-color="#574a68"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000044"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#555555"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#3d5a7d"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#5a7a4d"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9c6e2e"/>
    </marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#7d3f38"/>
    </marker>
    <marker id="arrow-info" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#574a68"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#ffffff"/>
    </marker>
  </defs>
  <rect x="40" y="40" width="227.5862" height="163.125" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="153.7932" y="105.25" text-anchor="middle" font-size="23.1901" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Class A</text>
  <text x="153.7932" y="166.8751" text-anchor="middle" font-size="21.0818" fill="var(--text-muted)" font-family="Arial, sans-serif">1.0.0.0 -</text>
  <text x="153.7932" y="203.125" text-anchor="middle" font-size="21.0818" fill="var(--text-muted)" font-family="Arial, sans-serif">126.255.255.255</text>
  <rect x="288.2758" y="40" width="227.5862" height="163.125" fill="url(#grad-info)" stroke="var(--info-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="402.0691" y="105.25" text-anchor="middle" font-size="23.1901" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Class B</text>
  <text x="402.0691" y="166.8751" text-anchor="middle" font-size="21.0818" fill="var(--text-muted)" font-family="Arial, sans-serif">128.0.0.0 -</text>
  <text x="402.0691" y="203.125" text-anchor="middle" font-size="21.0818" fill="var(--text-muted)" font-family="Arial, sans-serif">191.255.255.255</text>
  <rect x="536.5517" y="40" width="227.5862" height="163.125" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="650.3449" y="105.25" text-anchor="middle" font-size="23.1901" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Class C</text>
  <text x="650.3449" y="166.8751" text-anchor="middle" font-size="21.0818" fill="var(--text-muted)" font-family="Arial, sans-serif">192.0.0.0 -</text>
  <text x="650.3449" y="203.125" text-anchor="middle" font-size="21.0818" fill="var(--text-muted)" font-family="Arial, sans-serif">223.255.255.255</text>
  <rect x="784.8275" y="40" width="227.5862" height="163.125" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="898.6207" y="105.25" text-anchor="middle" font-size="23.1901" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Class D</text>
  <text x="898.6207" y="166.8751" text-anchor="middle" font-size="21.0818" fill="var(--text-muted)" font-family="Arial, sans-serif">224.0.0.0 -</text>
  <text x="898.6207" y="203.125" text-anchor="middle" font-size="21.0818" fill="var(--text-muted)" font-family="Arial, sans-serif">239.255.255.255</text>
  <rect x="1033.1035" y="40" width="206.8965" height="163.125" fill="url(#grad-danger)" stroke="var(--danger-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="1136.5517" y="105.25" text-anchor="middle" font-size="23.1901" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Class E</text>
  <text x="1136.5517" y="166.8751" text-anchor="middle" font-size="21.0818" fill="var(--text-muted)" font-family="Arial, sans-serif">240.0.0.0 -</text>
  <text x="1136.5517" y="203.125" text-anchor="middle" font-size="21.0818" fill="var(--text-muted)" font-family="Arial, sans-serif">255.255.255.255</text>
  <text x="153.7932" y="330.0001" text-anchor="middle" font-size="21.0818" fill="var(--text-muted)" font-family="Arial, sans-serif">/8 prefix</text>
  <text x="402.0691" y="330.0001" text-anchor="middle" font-size="21.0818" fill="var(--text-muted)" font-family="Arial, sans-serif">/16 prefix</text>
  <text x="650.3449" y="330.0001" text-anchor="middle" font-size="21.0818" fill="var(--text-muted)" font-family="Arial, sans-serif">/24 prefix</text>
  <text x="898.6207" y="330.0001" text-anchor="middle" font-size="21.0818" fill="var(--text-muted)" font-family="Arial, sans-serif">Multicast</text>
  <text x="1136.5517" y="330.0001" text-anchor="middle" font-size="21.0818" fill="var(--text-muted)" font-family="Arial, sans-serif">Reserved</text>
  <rect x="40" y="402.5" width="1199.9999" height="108.75" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" rx="6" opacity="0.3" filter="url(#shadow)"/>
  <text x="60.6898" y="475" font-size="21.0818" fill="var(--text)" font-family="Arial, sans-serif">Network bits:</text>
  <rect x="226.207" y="420.625" width="103.4483" height="72.5" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
