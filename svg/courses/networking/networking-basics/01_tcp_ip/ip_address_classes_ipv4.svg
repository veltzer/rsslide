  <rect x="722.7586" y="420.625" width="103.4483" height="72.5" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="774.4828" y="471.375" text-anchor="middle" font-size="21.0818" font-family="Arial, sans-serif" fill="var(--ok-text)">24</text>
  <text x="60.6898" y="601.875" font-size="21.0818" fill="var(--text)" font-family="Arial, sans-serif">Host bits:</text>
  <rect x="226.207" y="547.5" width="103.4483" height="72.5" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="277.9311" y="598.25" text-anchor="middle" font-size="21.0818" font-family="Arial, sans-serif" fill="var(--primary-text)">24</text>
  <rect x="474.4828" y="547.5" width="103.4483" height="72.5" fill="url(#grad-info)" stroke="var(--info-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="526.2069" y="598.25" text-anchor="middle" font-size="21.0818" font-family="Arial, sans-serif" fill="var(--info-text)">16</text>
  <rect x="722.7586" y="547.5" width="103.4483" height="72.5" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="774.4828" y="598.25" text-anchor="middle" font-size="21.0818" font-family="Arial, sans-serif" fill="var(--ok-text)">8</text>
</svg>
