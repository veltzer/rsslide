<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" style="background:var(--bg)">
  <metadata>
    <type>regular</type>
  </metadata>
  <defs>
    <style id="palette-vars">
      :root, svg {
        --bg: #ffffff;
        --surface: #c4cdd6;
        --border: #6b7280;
        --text: #212121;
        --text-muted: #555555;
        --text-faint: #888888;
        --code-bg: #1a1a2e;
        --shadow: #00000044;
        --black: #000000;
        --primary-fill: #5a7a9c;
        --primary-border: #3d5a7d;
        --primary-text: #ffffff;
        --primary-accent: #243b59;
        --ok-fill: #7a9a6a;
        --ok-border: #5a7a4d;
        --ok-text: #ffffff;
        --ok-accent: #385030;
        --warn-fill: #c8924a;
        --warn-border: #9c6e2e;
        --warn-text: #ffffff;
        --warn-accent: #5a3f12;
        --danger-fill: #a86058;
        --danger-border: #7d3f38;
        --danger-text: #ffffff;
        --danger-accent: #4a1f1a;
        --info-fill: #7c6a8e;
        --info-border: #574a68;
        --info-text: #ffffff;
        --info-accent: #2f253b;
      }
    </style>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7493b3"/>
      <stop offset="100%" stop-color="#3d5a7d"/>
    </linearGradient>

    <linearGradient id="grad-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4cdd6"/>
    </linearGradient>

    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94b384"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>

    <linearGradient id="grad-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dba868"/>
      <stop offset="100%" stop-color="#9c6e2e"/>
    </linearGradient>

    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd7d75"/>
      <stop offset="100%" stop-color="#7d3f38"/>
    </linearGradient>

    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9384a5"/>
      <stop offset="100%" stop-color="#574a68"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000044"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#555555"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#3d5a7d"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#5a7a4d"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9c6e2e"/>
    </marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#7d3f38"/>
    </marker>
    <marker id="arrow-info" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#574a68"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#ffffff"/>
    </marker>
  </defs>
  <rect x="40" y="210.5883" width="210.5263" height="204.7059" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="145.2632" y="295.8824" text-anchor="middle" font-size="22.6941" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Clients</text>
  <text x="145.2632" y="364.1176" text-anchor="middle" font-size="20.631" fill="var(--text-muted)" font-family="Arial, sans-serif">Requests</text>
  <rect x="482.1053" y="142.353" width="273.6841" height="341.1765" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="618.9474" y="227.6471" text-anchor="middle" font-size="24.7572" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Load Balancer</text>
  <text x="618.9474" y="295.8824" text-anchor="middle" font-size="20.631" fill="var(--text-muted)" font-family="Arial, sans-serif">Round Robin /</text>
  <text x="618.9474" y="347.0588" text-anchor="middle" font-size="20.631" fill="var(--text-muted)" font-family="Arial, sans-serif">Least Connections /</text>
  <text x="618.9474" y="398.2353" text-anchor="middle" font-size="20.631" fill="var(--text-muted)" font-family="Arial, sans-serif">IP Hash</text>
  <rect x="966.3159" y="40" width="273.6841" height="119.4117" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="1103.158" y="115.0589" text-anchor="middle" font-size="22.6941" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Server 1</text>
  <rect x="966.3159" y="193.5295" width="273.6841" height="119.4117" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="1103.158" y="268.5882" text-anchor="middle" font-size="22.6941" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Server 2</text>
  <rect x="966.3159" y="347.0588" width="273.6841" height="119.4117" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="1103.158" y="422.1177" text-anchor="middle" font-size="22.6941" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Server 3</text>
  <rect x="966.3159" y="500.5883" width="273.6841" height="119.4117" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="1103.158" y="575.647" text-anchor="middle" font-size="22.6941" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Server N</text>
  <line x1="250.5264" y1="295.8824" x2="482.1053" y2="295.8824" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <line x1="755.7896" y1="244.7059" x2="966.3159" y2="98" stroke="var(--ok-border)" stroke-width="2" marker-end="url(#arrow-ok)"/>
  <line x1="755.7896" y1="278.8235" x2="966.3159" y2="251.5294" stroke="var(--ok-border)" stroke-width="2" marker-end="url(#arrow-ok)"/>
  <line x1="755.7896" y1="312.9412" x2="966.3159" y2="405.0589" stroke="var(--ok-border)" stroke-width="2" marker-end="url(#arrow-ok)"/>
  <line x1="755.7896" y1="347.0588" x2="966.3159" y2="558.5882" stroke="var(--ok-border)" stroke-width="2" marker-end="url(#arrow-ok)"/>
</svg>
