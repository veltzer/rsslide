<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" style="background:var(--bg)">
  <metadata>
    <type>regular</type>
  </metadata>
  <defs>
    <style id="palette-vars">
      :root, svg {
        --bg: #ffffff;
        --surface: #c4cdd6;
        --border: #6b7280;
        --text: #212121;
        --text-muted: #555555;
        --text-faint: #888888;
        --code-bg: #1a1a2e;
        --shadow: #00000044;
        --black: #000000;
        --primary-fill: #5a7a9c;
        --primary-border: #3d5a7d;
        --primary-text: #ffffff;
        --primary-accent: #243b59;
        --ok-fill: #7a9a6a;
        --ok-border: #5a7a4d;
        --ok-text: #ffffff;
        --ok-accent: #385030;
        --warn-fill: #c8924a;
        --warn-border: #9c6e2e;
        --warn-text: #ffffff;
        --warn-accent: #5a3f12;
        --danger-fill: #a86058;
        --danger-border: #7d3f38;
        --danger-text: #ffffff;
        --danger-accent: #4a1f1a;
        --info-fill: #7c6a8e;
        --info-border: #574a68;
        --info-text: #ffffff;
        --info-accent: #2f253b;
      }
    </style>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7493b3"/>
      <stop offset="100%" stop-color="#3d5a7d"/>
    </linearGradient>

    <linearGradient id="grad-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4cdd6"/>
    </linearGradient>

    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94b384"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>

    <linearGradient id="grad-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dba868"/>
      <stop offset="100%" stop-color="#9c6e2e"/>
    </linearGradient>

    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd7d75"/>
      <stop offset="100%" stop-color="#7d3f38"/>
    </linearGradient>

    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9384a5"/>
      <stop offset="100%" stop-color="#574a68"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000044"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#555555"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#3d5a7d"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#5a7a4d"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9c6e2e"/>
    </marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#7d3f38"/>
    </marker>
    <marker id="arrow-info" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#574a68"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#ffffff"/>
    </marker>
  </defs>
  <text x="188.6725" y="40" text-anchor="middle" font-size="23.8718" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Private Network</text>
  <rect x="40" y="77.4194" width="276.1062" height="130.9677" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="178.0531" y="141.0323" text-anchor="middle" font-size="21.7016" font-family="Arial, sans-serif" fill="var(--primary-text)">PC: 192.168.1.10</text>
  <text x="178.0531" y="189.6774" text-anchor="middle" font-size="21.7016" font-family="Arial, sans-serif" fill="var(--primary-text)">:3000</text>
  <rect x="40" y="245.8065" width="276.1062" height="130.9677" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="178.0531" y="309.4194" text-anchor="middle" font-size="21.7016" font-family="Arial, sans-serif" fill="var(--primary-text)">Phone: 192.168.1.20</text>
  <text x="178.0531" y="358.0645" text-anchor="middle" font-size="21.7016" font-family="Arial, sans-serif" fill="var(--primary-text)">:4000</text>
  <rect x="40" y="414.1935" width="276.1062" height="130.9677" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="178.0531" y="477.8065" text-anchor="middle" font-size="21.7016" font-family="Arial, sans-serif" fill="var(--primary-text)">IoT: 192.168.1.30</text>
  <text x="178.0531" y="526.4516" text-anchor="middle" font-size="21.7016" font-family="Arial, sans-serif" fill="var(--primary-text)">:5000</text>
  <rect x="475.3982" y="170.9677" width="318.5841" height="299.3548" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="634.6902" y="253.2903" text-anchor="middle" font-size="26.042" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">NAT Gateway</text>
  <text x="634.6902" y="320.6452" text-anchor="middle" font-size="21.7016" fill="var(--text-muted)" font-family="Arial, sans-serif">Internal: 192.168.1.1</text>
  <text x="634.6902" y="376.7742" text-anchor="middle" font-size="21.7016" fill="var(--text-muted)" font-family="Arial, sans-serif">External: 203.0.113.5</text>
  <text x="634.6902" y="432.9032" text-anchor="middle" font-size="21.7016" fill="var(--text-muted)" font-family="Arial, sans-serif">Port mapping table</text>
  <rect x="963.8938" y="189.6774" width="276.1062" height="261.9355" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="1101.947" y="275.7419" text-anchor="middle" font-size="26.042" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Internet</text>
  <text x="1101.947" y="339.3548" text-anchor="middle" font-size="21.7016" fill="var(--text-muted)" font-family="Arial, sans-serif">Sees only:</text>
  <text x="1101.947" y="395.4839" text-anchor="middle" font-size="21.7016" fill="var(--text-muted)" font-family="Arial, sans-serif">203.0.113.5</text>
  <line x1="316.1062" y1="152.2581" x2="475.3982" y2="245.8065" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <line x1="316.1062" y1="309.4194" x2="475.3982" y2="320.6452" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <line x1="316.1062" y1="477.8065" x2="475.3982" y2="395.4839" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <line x1="793.9823" y1="320.6452" x2="963.8938" y2="320.6452" stroke="var(--ok-border)" stroke-width="2" marker-end="url(#arrow-ok)"/>
  <text x="634.6902" y="620" text-anchor="middle" font-size="21.7016" fill="var(--text-muted)" font-family="Arial, sans-serif">Many private IPs mapped to one public IP</text>
</svg>
