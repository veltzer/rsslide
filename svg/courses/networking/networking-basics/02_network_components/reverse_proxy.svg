<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" style="background:var(--bg)">
  <metadata>
    <type>regular</type>
  </metadata>
  <defs>
    <style id="palette-vars">
      :root, svg {
        --bg: #ffffff;
        --surface: #c4cdd6;
        --border: #6b7280;
        --text: #212121;
        --text-muted: #555555;
        --text-faint: #888888;
        --code-bg: #1a1a2e;
        --shadow: #00000044;
        --black: #000000;
        --primary-fill: #5a7a9c;
        --primary-border: #3d5a7d;
        --primary-text: #ffffff;
        --primary-accent: #243b59;
        --ok-fill: #7a9a6a;
        --ok-border: #5a7a4d;
        --ok-text: #ffffff;
        --ok-accent: #385030;
        --warn-fill: #c8924a;
        --warn-border: #9c6e2e;
        --warn-text: #ffffff;
        --warn-accent: #5a3f12;
        --danger-fill: #a86058;
        --danger-border: #7d3f38;
        --danger-text: #ffffff;
        --danger-accent: #4a1f1a;
        --info-fill: #7c6a8e;
        --info-border: #574a68;
        --info-text: #ffffff;
        --info-accent: #2f253b;
      }
    </style>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7493b3"/>
      <stop offset="100%" stop-color="#3d5a7d"/>
    </linearGradient>

    <linearGradient id="grad-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4cdd6"/>
    </linearGradient>

    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94b384"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>

    <linearGradient id="grad-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dba868"/>
      <stop offset="100%" stop-color="#9c6e2e"/>
    </linearGradient>

    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd7d75"/>
      <stop offset="100%" stop-color="#7d3f38"/>
    </linearGradient>

    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9384a5"/>
      <stop offset="100%" stop-color="#574a68"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000044"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#555555"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#3d5a7d"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#5a7a4d"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9c6e2e"/>
    </marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#7d3f38"/>
    </marker>
    <marker id="arrow-info" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#574a68"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#ffffff"/>
    </marker>
  </defs>
  <rect x="40" y="159.4118" width="214.2857" height="136.4706" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="147.1429" y="244.7059" text-anchor="middle" font-size="22.8959" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Client A</text>
  <rect x="40" y="347.0588" width="214.2857" height="136.4706" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="147.1429" y="432.3529" text-anchor="middle" font-size="22.8959" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Client B</text>
  <rect x="447.1429" y="193.5294" width="300" height="307.0588" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="597.1429" y="268.5882" text-anchor="middle" font-size="24.9773" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Reverse Proxy</text>
  <text x="597.1429" y="330" text-anchor="middle" font-size="20.8144" fill="var(--text-muted)" font-family="Arial, sans-serif">SSL Termination</text>
  <text x="597.1429" y="381.1765" text-anchor="middle" font-size="20.8144" fill="var(--text-muted)" font-family="Arial, sans-serif">Caching / Compression</text>
  <text x="597.1429" y="432.3529" text-anchor="middle" font-size="20.8144" fill="var(--text-muted)" font-family="Arial, sans-serif">Load Balancing</text>
  <rect x="961.4286" y="108.2353" width="278.5714" height="119.4118" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="1100.7143" y="183.2941" text-anchor="middle" font-size="22.8959" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">App Server 1</text>
  <rect x="961.4286" y="278.8235" width="278.5714" height="119.4118" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="1100.7143" y="353.8824" text-anchor="middle" font-size="22.8959" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">App Server 2</text>
  <rect x="961.4286" y="449.4118" width="278.5714" height="119.4118" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="1100.7143" y="524.4706" text-anchor="middle" font-size="22.8959" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">App Server 3</text>
  <line x1="254.2858" y1="227.6471" x2="447.1429" y2="278.8235" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <line x1="254.2858" y1="415.2941" x2="447.1429" y2="398.2353" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <line x1="747.1428" y1="278.8235" x2="961.4286" y2="166.2353" stroke="var(--ok-border)" stroke-width="2" marker-end="url(#arrow-ok)"/>
  <line x1="747.1428" y1="347.0588" x2="961.4286" y2="336.8235" stroke="var(--ok-border)" stroke-width="2" marker-end="url(#arrow-ok)"/>
  <line x1="747.1428" y1="415.2941" x2="961.4286" y2="507.4118" stroke="var(--ok-border)" stroke-width="2" marker-end="url(#arrow-ok)"/>
  <text x="597.1429" y="620" text-anchor="middle" font-size="20.8144" fill="var(--text-muted)" font-family="Arial, sans-serif">Clients see proxy address, not backend servers</text>
  <rect x="865" y="40" width="128.5714" height="68.2353" fill="url(#grad-info)" stroke="var(--info-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="929.2858" y="87.7647" text-anchor="middle" font-size="20.8144" font-family="Arial, sans-serif" fill="var(--info-text)">Server side</text>
</svg>
