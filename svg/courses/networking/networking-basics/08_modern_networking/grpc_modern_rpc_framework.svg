<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Arial, sans-serif" style="background:var(--bg)">
  <metadata>
    <type>regular</type>
  </metadata>
  <text x="301.9718" y="40" text-anchor="middle" font-size="32.5194" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">REST/JSON</text>
  <rect x="40" y="104.4444" width="202.8169" height="177.2222" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="141.4084" y="207.5556" text-anchor="middle" font-size="28.4544" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Client</text>
  <rect x="411.831" y="104.4444" width="202.8169" height="177.2222" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="513.2394" y="207.5556" text-anchor="middle" font-size="28.4544" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Server</text>
  <line x1="242.8169" y1="162.4444" x2="408.4507" y2="162.4444" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <text x="325.6338" y="143.1111" text-anchor="middle" font-size="22.357" fill="var(--text-muted)" font-family="Arial, sans-serif">JSON</text>
  <line x1="408.4507" y1="226.8889" x2="242.8169" y2="226.8889" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <text x="325.6338" y="265.5556" text-anchor="middle" font-size="22.357" fill="var(--text-muted)" font-family="Arial, sans-serif">JSON</text>
  <text x="301.9718" y="72.2222" text-anchor="middle" font-size="24.3895" fill="var(--text-faint)" font-family="Arial, sans-serif">HTTP/1.1</text>
  <rect x="40" y="346.1111" width="574.6479" height="273.8889" rx="6" fill="url(#grad-danger)" stroke="var(--danger-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="327.3239" y="420.2222" text-anchor="middle" font-size="26.422" fill="var(--text-muted)" font-family="Arial, sans-serif">Text-based &amp; larger payload</text>
  <text x="327.3239" y="484.6667" text-anchor="middle" font-size="26.422" fill="var(--text-muted)" font-family="Arial, sans-serif">No type safety</text>
  <text x="327.3239" y="549.1111" text-anchor="middle" font-size="26.422" fill="var(--text-muted)" font-family="Arial, sans-serif">Request/response only</text>
  <text x="952.676" y="40" text-anchor="middle" font-size="32.5194" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">gRPC/Protobuf</text>
  <rect x="716.0563" y="104.4444" width="202.8169" height="177.2222" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="817.4648" y="207.5556" text-anchor="middle" font-size="28.4544" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Client</text>
  <rect x="1070.9859" y="104.4444" width="169.0141" height="177.2222" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="1155.4929" y="207.5556" text-anchor="middle" font-size="28.4544" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Server</text>
  <line x1="918.8732" y1="162.4444" x2="1067.6055" y2="162.4444" stroke="var(--ok-border)" stroke-width="2" marker-end="url(#arrow-ok)"/>
  <text x="993.2394" y="143.1111" text-anchor="middle" font-size="22.357" fill="var(--text-muted)" font-family="Arial, sans-serif">Binary</text>
  <line x1="1067.6055" y1="226.8889" x2="918.8732" y2="226.8889" stroke="var(--ok-border)" stroke-width="2" marker-end="url(#arrow-ok)"/>
  <text x="993.2394" y="265.5556" text-anchor="middle" font-size="22.357" fill="var(--text-muted)" font-family="Arial, sans-serif">Binary</text>
  <text x="952.676" y="72.2222" text-anchor="middle" font-size="24.3895" fill="var(--text-faint)" font-family="Arial, sans-serif">HTTP/2</text>
  <rect x="699.1549" y="346.1111" width="540.845" height="273.8889" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="969.5774" y="420.2222" text-anchor="middle" font-size="26.422" fill="var(--text-muted)" font-family="Arial, sans-serif">Binary &amp; smaller payload</text>
  <text x="969.5774" y="484.6667" text-anchor="middle" font-size="26.422" fill="var(--text-muted)" font-family="Arial, sans-serif">Strongly typed</text>
  <text x="969.5774" y="549.1111" text-anchor="middle" font-size="26.422" fill="var(--text-muted)" font-family="Arial, sans-serif">Streaming support</text>
  <defs>
    <style id="palette-vars">
      :root, svg {
        --bg: #ffffff;
        --surface: #c4cdd6;
        --border: #6b7280;
        --text: #212121;
        --text-muted: #555555;
        --text-faint: #888888;
        --code-bg: #1a1a2e;
        --shadow: #00000044;
        --black: #000000;
        --primary-fill: #5a7a9c;
        --primary-border: #3d5a7d;
        --primary-text: #ffffff;
        --primary-accent: #243b59;
        --ok-fill: #7a9a6a;
        --ok-border: #5a7a4d;
        --ok-text: #ffffff;
        --ok-accent: #385030;
        --warn-fill: #c8924a;
        --warn-border: #9c6e2e;
        --warn-text: #ffffff;
        --warn-accent: #5a3f12;
        --danger-fill: #a86058;
        --danger-border: #7d3f38;
        --danger-text: #ffffff;
        --danger-accent: #4a1f1a;
        --info-fill: #7c6a8e;
        --info-border: #574a68;
        --info-text: #ffffff;
        --info-accent: #2f253b;
      }
    </style>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7493b3"/>
      <stop offset="100%" stop-color="#3d5a7d"/>
    </linearGradient>

    <linearGradient id="grad-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4cdd6"/>
    </linearGradient>

    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94b384"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>

    <linearGradient id="grad-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dba868"/>
      <stop offset="100%" stop-color="#9c6e2e"/>
    </linearGradient>

    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd7d75"/>
      <stop offset="100%" stop-color="#7d3f38"/>
    </linearGradient>

    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9384a5"/>
      <stop offset="100%" stop-color="#574a68"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000044"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#555555"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#3d5a7d"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#5a7a4d"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9c6e2e"/>
    </marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#7d3f38"/>
    </marker>
    <marker id="arrow-info" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#574a68"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#ffffff"/>
    </marker>
  </defs>
</svg>
