<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Arial, sans-serif" style="background:var(--bg)">
  <metadata>
    <type>regular</type>
  </metadata>
  <defs>
    <style id="palette-vars">
      :root, svg {
        --bg: #ffffff;
        --surface: #c4cdd6;
        --border: #6b7280;
        --text: #212121;
        --text-muted: #555555;
        --text-faint: #888888;
        --code-bg: #1a1a2e;
        --shadow: #00000044;
        --black: #000000;
        --primary-fill: #5a7a9c;
        --primary-border: #3d5a7d;
        --primary-text: #ffffff;
        --primary-accent: #243b59;
        --ok-fill: #7a9a6a;
        --ok-border: #5a7a4d;
        --ok-text: #ffffff;
        --ok-accent: #385030;
        --warn-fill: #c8924a;
        --warn-border: #9c6e2e;
        --warn-text: #ffffff;
        --warn-accent: #5a3f12;
        --danger-fill: #a86058;
        --danger-border: #7d3f38;
        --danger-text: #ffffff;
        --danger-accent: #4a1f1a;
        --info-fill: #7c6a8e;
        --info-border: #574a68;
        --info-text: #ffffff;
        --info-accent: #2f253b;
      }
    </style>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7493b3"/>
      <stop offset="100%" stop-color="#3d5a7d"/>
    </linearGradient>

    <linearGradient id="grad-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4cdd6"/>
    </linearGradient>

    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94b384"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>

    <linearGradient id="grad-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dba868"/>
      <stop offset="100%" stop-color="#9c6e2e"/>
    </linearGradient>

    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd7d75"/>
      <stop offset="100%" stop-color="#7d3f38"/>
    </linearGradient>

    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9384a5"/>
      <stop offset="100%" stop-color="#574a68"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000044"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#555555"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#3d5a7d"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#5a7a4d"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9c6e2e"/>
    </marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#7d3f38"/>
    </marker>
    <marker id="arrow-info" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#574a68"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#ffffff"/>
    </marker>
  </defs>
  <text x="640" y="40" text-anchor="middle" font-size="35.0716" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">DNS-Based Service Discovery</text>
  <rect x="40" y="71.6364" width="1200" height="548.3636" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="134.9091" text-anchor="middle" font-size="30.6877" font-weight="bold" fill="var(--primary-accent)" font-family="Arial, sans-serif">Service Registry</text>
  <text x="640" y="177.0909" text-anchor="middle" font-size="24.1118" fill="var(--text-muted)" font-family="Arial, sans-serif">(Consul, CoreDNS, AWS Cloud Map)</text>
  <line x1="88.0001" y1="198.1818" x2="1192.0001" y2="198.1818" stroke="var(--primary-border)" stroke-width="2"/>
  <rect x="88.0001" y="229.8182" width="1104" height="80.1455" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="136" y="267.7818" font-size="26.3037" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">web.service.consul</text>
  <text x="712" y="267.7818" font-size="26.3037" fill="var(--text-muted)" font-family="Arial, sans-serif">→</text>
  <text x="760" y="267.7818" font-size="26.3037" fill="var(--ok-accent)" font-family="Arial, sans-serif">10.0.1.5, 10.0.2.3</text>
  <rect x="88.0001" y="324.7273" width="1104" height="80.1455" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="136" y="362.6909" font-size="26.3037" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">api.service.consul</text>
  <text x="712" y="362.6909" font-size="26.3037" fill="var(--text-muted)" font-family="Arial, sans-serif">→</text>
  <text x="760" y="362.6909" font-size="26.3037" fill="var(--ok-accent)" font-family="Arial, sans-serif">10.0.1.8</text>
  <rect x="88.0001" y="419.6363" width="1104" height="80.1455" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="136" y="457.6" font-size="26.3037" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">db.service.consul</text>
  <text x="712" y="457.6" font-size="26.3037" fill="var(--text-muted)" font-family="Arial, sans-serif">→</text>
  <text x="760" y="457.6" font-size="26.3037" fill="var(--ok-accent)" font-family="Arial, sans-serif">10.0.3.2</text>
  <rect x="88.0001" y="514.5454" width="1104" height="80.1455" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="136" y="552.5091" font-size="26.3037" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">cache.service.consul</text>
  <text x="712" y="552.5091" font-size="26.3037" fill="var(--text-muted)" font-family="Arial, sans-serif">→</text>
  <text x="760" y="552.5091" font-size="26.3037" fill="var(--ok-accent)" font-family="Arial, sans-serif">10.0.1.9, 10.0.2.7</text>
</svg>
