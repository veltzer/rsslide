<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Arial, sans-serif" style="background:var(--bg)">
  <metadata>
    <type>regular</type>
  </metadata>
  <text x="265" y="40" text-anchor="middle" font-size="27.9989" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Without Service Mesh</text>
  <text x="940" y="40" text-anchor="middle" font-size="27.9989" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">With Service Mesh</text>
  <rect x="40" y="93.9534" width="216.6666" height="323.7209" rx="6" fill="url(#grad-danger)" stroke="var(--danger-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="148.3334" y="161.3953" text-anchor="middle" font-size="26.1324" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Service A</text>
  <text x="148.3334" y="215.3488" text-anchor="middle" font-size="20.5326" fill="var(--text-muted)" font-family="Arial, sans-serif">(retry, timeout,</text>
  <text x="148.3334" y="255.8139" text-anchor="middle" font-size="20.5326" fill="var(--text-muted)" font-family="Arial, sans-serif">circuit breaker,</text>
  <text x="148.3334" y="296.279" text-anchor="middle" font-size="20.5326" fill="var(--text-muted)" font-family="Arial, sans-serif">in code)</text>
  <rect x="356.6667" y="93.9534" width="216.6666" height="323.7209" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="465" y="255.8139" text-anchor="middle" font-size="26.1324" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Service B</text>
  <line x1="256.6667" y1="255.8139" x2="356.6667" y2="255.8139" stroke="var(--text)" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="706.6667" y="93.9534" width="216.6666" height="323.7209" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="815" y="161.3953" text-anchor="middle" font-size="26.1324" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Service A</text>
  <rect x="756.6667" y="242.3256" width="100" height="80.9302" rx="6" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="806.6666" y="296.279" text-anchor="middle" font-size="20.5326" fill="var(--text)" font-family="Arial, sans-serif">Proxy</text>
  <rect x="1023.3334" y="93.9534" width="216.6666" height="323.7209" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="1131.6666" y="161.3953" text-anchor="middle" font-size="26.1324" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Service B</text>
  <rect x="1073.3333" y="242.3256" width="100" height="80.9302" rx="6" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="1123.3333" y="296.279" text-anchor="middle" font-size="20.5326" fill="var(--text)" font-family="Arial, sans-serif">Proxy</text>
  <line x1="856.6667" y1="282.7907" x2="1073.3333" y2="282.7907" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <text x="815" y="485.1162" text-anchor="middle" font-size="22.3991" fill="var(--text-muted)" font-family="Arial, sans-serif">Sidecar</text>
  <text x="1131.6666" y="485.1162" text-anchor="middle" font-size="22.3991" fill="var(--text-muted)" font-family="Arial, sans-serif">Sidecar</text>
  <text x="940" y="566.0466" text-anchor="middle" font-size="24.2657" fill="var(--text)" font-family="Arial, sans-serif">Proxies handle:</text>
  <text x="940" y="620" text-anchor="middle" font-size="22.3991" fill="var(--text-muted)" font-family="Arial, sans-serif">mTLS | Retries | Circuit breaking | Observability</text>
  <defs>
    <style id="palette-vars">
      :root, svg {
        --bg: #ffffff;
        --surface: #c4cdd6;
        --border: #6b7280;
        --text: #212121;
        --text-muted: #555555;
        --text-faint: #888888;
        --code-bg: #1a1a2e;
        --shadow: #00000044;
        --black: #000000;
        --primary-fill: #5a7a9c;
        --primary-border: #3d5a7d;
        --primary-text: #ffffff;
        --primary-accent: #243b59;
        --ok-fill: #7a9a6a;
        --ok-border: #5a7a4d;
        --ok-text: #ffffff;
        --ok-accent: #385030;
        --warn-fill: #c8924a;
        --warn-border: #9c6e2e;
        --warn-text: #ffffff;
        --warn-accent: #5a3f12;
        --danger-fill: #a86058;
        --danger-border: #7d3f38;
        --danger-text: #ffffff;
        --danger-accent: #4a1f1a;
        --info-fill: #7c6a8e;
        --info-border: #574a68;
        --info-text: #ffffff;
        --info-accent: #2f253b;
      }
    </style>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7493b3"/>
      <stop offset="100%" stop-color="#3d5a7d"/>
    </linearGradient>

    <linearGradient id="grad-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4cdd6"/>
    </linearGradient>

    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94b384"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>

    <linearGradient id="grad-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dba868"/>
      <stop offset="100%" stop-color="#9c6e2e"/>
    </linearGradient>

    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd7d75"/>
      <stop offset="100%" stop-color="#7d3f38"/>
    </linearGradient>

    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9384a5"/>
      <stop offset="100%" stop-color="#574a68"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000044"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#555555"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#3d5a7d"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#5a7a4d"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9c6e2e"/>
    </marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#7d3f38"/>
    </marker>
    <marker id="arrow-info" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#574a68"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#ffffff"/>
    </marker>
  </defs>
</svg>
