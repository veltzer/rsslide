  <line x1="258.1818" y1="200.2632" x2="258.1818" y2="238.4211" stroke="var(--primary-border)" stroke-width="2"/>
  <line x1="258.1818" y1="322.3684" x2="258.1818" y2="360.5263" stroke="var(--primary-border)" stroke-width="2"/>
  <rect x="730.9091" y="40" width="509.0909" height="503.6842" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="985.4545" y="85.7895" text-anchor="middle" font-size="25.8075" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Host B</text>
  <rect x="840" y="116.3158" width="290.909" height="83.9474" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="985.4545" y="151.4211" text-anchor="middle" font-size="20.9686" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Container</text>
  <text x="985.4545" y="181.9474" text-anchor="middle" font-size="19.3556" fill="var(--text-muted)" font-family="Arial, sans-serif">10.0.0.3</text>
  <rect x="821.818" y="238.4211" width="327.2727" height="83.9474" rx="6" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="985.4545" y="273.5263" text-anchor="middle" font-size="20.9686" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Overlay Net</text>
  <text x="985.4545" y="304.0526" text-anchor="middle" font-size="19.3556" fill="var(--text-muted)" font-family="Arial, sans-serif">VXLAN tunnel</text>
  <rect x="821.818" y="360.5263" width="327.2727" height="83.9474" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="985.4545" y="395.6316" text-anchor="middle" font-size="20.9686" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">eth0</text>
  <text x="985.4545" y="426.1579" text-anchor="middle" font-size="19.3556" fill="var(--text-muted)" font-family="Arial, sans-serif">192.168.1.20</text>
  <line x1="985.4545" y1="200.2632" x2="985.4545" y2="238.4211" stroke="var(--primary-border)" stroke-width="2"/>
  <line x1="985.4545" y1="322.3684" x2="985.4545" y2="360.5263" stroke="var(--primary-border)" stroke-width="2"/>
  <line x1="258.1818" y1="444.4737" x2="258.1818" y2="589.4737" stroke="var(--primary-border)" stroke-width="2"/>
  <line x1="985.4545" y1="444.4737" x2="985.4545" y2="589.4737" stroke="var(--primary-border)" stroke-width="2"/>
  <line x1="258.1818" y1="589.4737" x2="985.4545" y2="589.4737" stroke="var(--primary-border)" stroke-width="2" stroke-dasharray="12.8 6.4"/>
  <text x="621.8182" y="620" text-anchor="middle" font-size="22.5816" font-weight="bold" fill="var(--primary-accent)" font-family="Arial, sans-serif">VXLAN Tunnel</text>
