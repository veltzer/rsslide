  <rect x="94.5456" y="238.4211" width="327.2727" height="83.9474" rx="6" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="258.1818" y="273.5263" text-anchor="middle" font-size="20.9686" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Overlay Net</text>
  <text x="258.1818" y="304.0526" text-anchor="middle" font-size="19.3556" fill="var(--text-muted)" font-family="Arial, sans-serif">VXLAN tunnel</text>
  <rect x="94.5456" y="360.5263" width="327.2727" height="83.9474" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="258.1818" y="395.6316" text-anchor="middle" font-size="20.9686" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">eth0</text>
