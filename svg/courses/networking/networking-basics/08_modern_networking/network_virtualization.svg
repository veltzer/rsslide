<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Arial, sans-serif" style="background:var(--bg)">
  <metadata>
    <type>regular</type>
  </metadata>
  <defs>
    <style id="palette-vars">
      :root, svg {
        --bg: #ffffff;
        --surface: #c4cdd6;
        --border: #6b7280;
        --text: #212121;
        --text-muted: #555555;
        --text-faint: #888888;
        --code-bg: #1a1a2e;
        --shadow: #00000044;
        --black: #000000;
        --primary-fill: #5a7a9c;
        --primary-border: #3d5a7d;
        --primary-text: #ffffff;
        --primary-accent: #243b59;
        --ok-fill: #7a9a6a;
        --ok-border: #5a7a4d;
        --ok-text: #ffffff;
        --ok-accent: #385030;
        --warn-fill: #c8924a;
        --warn-border: #9c6e2e;
        --warn-text: #ffffff;
        --warn-accent: #5a3f12;
        --danger-fill: #a86058;
        --danger-border: #7d3f38;
        --danger-text: #ffffff;
        --danger-accent: #4a1f1a;
        --info-fill: #7c6a8e;
        --info-border: #574a68;
        --info-text: #ffffff;
        --info-accent: #2f253b;
      }
    </style>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7493b3"/>
      <stop offset="100%" stop-color="#3d5a7d"/>
    </linearGradient>

    <linearGradient id="grad-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4cdd6"/>
    </linearGradient>

    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94b384"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>

    <linearGradient id="grad-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dba868"/>
      <stop offset="100%" stop-color="#9c6e2e"/>
    </linearGradient>

    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd7d75"/>
      <stop offset="100%" stop-color="#7d3f38"/>
    </linearGradient>

    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9384a5"/>
      <stop offset="100%" stop-color="#574a68"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000044"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#555555"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#3d5a7d"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#5a7a4d"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9c6e2e"/>
    </marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#7d3f38"/>
    </marker>
    <marker id="arrow-info" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#574a68"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#ffffff"/>
    </marker>
  </defs>
  <text x="350.7913" y="40" text-anchor="middle" font-size="27.0093" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Original Frame</text>
  <rect x="91.7986" y="68.2926" width="207.1942" height="141.4634" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="195.3957" y="153.1707" text-anchor="middle" font-size="23.4081" fill="var(--text)" font-family="Arial, sans-serif">Eth Hdr</text>
  <rect x="298.9928" y="68.2926" width="207.1942" height="141.4634" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="402.5899" y="153.1707" text-anchor="middle" font-size="23.4081" fill="var(--text)" font-family="Arial, sans-serif">IP Hdr</text>
  <rect x="506.187" y="68.2926" width="207.1942" height="141.4634" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="609.7841" y="153.1707" text-anchor="middle" font-size="23.4081" fill="var(--text)" font-family="Arial, sans-serif">Data</text>
  <text x="652.9496" y="322.9268" text-anchor="middle" font-size="27.0093" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">VXLAN Encapsulated</text>
  <rect x="40" y="365.3658" width="164.0287" height="155.6098" rx="6" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="121.1511" y="430.439" text-anchor="middle" font-size="19.8068" fill="var(--text)" font-family="Arial, sans-serif">Outer</text>
  <text x="121.1511" y="478.5366" text-anchor="middle" font-size="19.8068" fill="var(--text)" font-family="Arial, sans-serif">Eth Hdr</text>
  <rect x="212.6619" y="365.3658" width="164.0287" height="155.6098" rx="6" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="293.8129" y="430.439" text-anchor="middle" font-size="19.8068" fill="var(--text)" font-family="Arial, sans-serif">Outer</text>
  <text x="293.8129" y="478.5366" text-anchor="middle" font-size="19.8068" fill="var(--text)" font-family="Arial, sans-serif">IP Hdr</text>
  <rect x="385.3238" y="365.3658" width="164.0287" height="155.6098" rx="6" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="466.4748" y="430.439" text-anchor="middle" font-size="19.8068" fill="var(--text)" font-family="Arial, sans-serif">Outer</text>
  <text x="466.4748" y="478.5366" text-anchor="middle" font-size="19.8068" fill="var(--text)" font-family="Arial, sans-serif">UDP (4789)</text>
  <rect x="557.9856" y="365.3658" width="164.0287" height="155.6098" rx="6" fill="url(#grad-danger)" stroke="var(--danger-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="639.1367" y="430.439" text-anchor="middle" font-size="19.8068" fill="var(--text)" font-family="Arial, sans-serif">VXLAN</text>
  <text x="639.1367" y="478.5366" text-anchor="middle" font-size="19.8068" fill="var(--text)" font-family="Arial, sans-serif">Header (VNI)</text>
  <rect x="730.6475" y="365.3658" width="164.0287" height="155.6098" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="811.7985" y="430.439" text-anchor="middle" font-size="19.8068" fill="var(--text)" font-family="Arial, sans-serif">Original</text>
  <text x="811.7985" y="478.5366" text-anchor="middle" font-size="19.8068" fill="var(--text)" font-family="Arial, sans-serif">Eth Hdr</text>
  <rect x="903.3094" y="365.3658" width="164.0287" height="155.6098" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="984.4604" y="430.439" text-anchor="middle" font-size="19.8068" fill="var(--text)" font-family="Arial, sans-serif">Original</text>
  <text x="984.4604" y="478.5366" text-anchor="middle" font-size="19.8068" fill="var(--text)" font-family="Arial, sans-serif">IP Hdr</text>
  <rect x="1075.9712" y="365.3658" width="164.0287" height="155.6098" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="1157.1223" y="458.7317" text-anchor="middle" font-size="23.4081" fill="var(--text)" font-family="Arial, sans-serif">Data</text>
  <text x="350.7913" y="620" text-anchor="middle" font-size="21.6075" fill="var(--warn-accent)" font-weight="bold" font-family="Arial, sans-serif">Outer transport headers</text>
  <line x1="40" y1="563.4146" x2="722.0144" y2="563.4146" stroke="var(--warn-border)" stroke-width="2" stroke-dasharray="6.8267 5.12"/>
  <text x="989.6403" y="620" text-anchor="middle" font-size="21.6075" fill="var(--primary-accent)" font-weight="bold" font-family="Arial, sans-serif">Inner original headers + data</text>
  <line x1="730.6475" y1="563.4146" x2="1240" y2="563.4146" stroke="var(--primary-border)" stroke-width="2" stroke-dasharray="6.8267 5.12"/>
</svg>
