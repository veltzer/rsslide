<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Arial, sans-serif" style="background:var(--bg)">
  <metadata>
    <type>regular</type>
  </metadata>
  <defs>
    <style id="palette-vars">
      :root, svg {
        --bg: #ffffff;
        --surface: #c4cdd6;
        --border: #6b7280;
        --text: #212121;
        --text-muted: #555555;
        --text-faint: #888888;
        --code-bg: #1a1a2e;
        --shadow: #00000044;
        --black: #000000;
        --primary-fill: #5a7a9c;
        --primary-border: #3d5a7d;
        --primary-text: #ffffff;
        --primary-accent: #243b59;
        --ok-fill: #7a9a6a;
        --ok-border: #5a7a4d;
        --ok-text: #ffffff;
        --ok-accent: #385030;
        --warn-fill: #c8924a;
        --warn-border: #9c6e2e;
        --warn-text: #ffffff;
        --warn-accent: #5a3f12;
        --danger-fill: #a86058;
        --danger-border: #7d3f38;
        --danger-text: #ffffff;
        --danger-accent: #4a1f1a;
        --info-fill: #7c6a8e;
        --info-border: #574a68;
        --info-text: #ffffff;
        --info-accent: #2f253b;
      }
    </style>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7493b3"/>
      <stop offset="100%" stop-color="#3d5a7d"/>
    </linearGradient>

    <linearGradient id="grad-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4cdd6"/>
    </linearGradient>

    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94b384"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>

    <linearGradient id="grad-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dba868"/>
      <stop offset="100%" stop-color="#9c6e2e"/>
    </linearGradient>

    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd7d75"/>
      <stop offset="100%" stop-color="#7d3f38"/>
    </linearGradient>

    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9384a5"/>
      <stop offset="100%" stop-color="#574a68"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000044"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#555555"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#3d5a7d"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#5a7a4d"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9c6e2e"/>
    </marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#7d3f38"/>
    </marker>
    <marker id="arrow-info" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#574a68"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#ffffff"/>
    </marker>
  </defs>
  <rect x="40" y="40" width="1200" height="580" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="639.9999" y="82.2917" text-anchor="middle" font-size="23.9535" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Service Mesh</text>
  <rect x="98.0645" y="106.4583" width="1083.8709" height="114.7917" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="136.7742" y="136.6667" font-size="18.6305" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Traffic Management:</text>
  <text x="136.7742" y="160.8333" font-size="15.969" fill="var(--text-muted)" font-family="Arial, sans-serif">- Load balancing (round-robin, least-conn)</text>
  <text x="136.7742" y="181.375" font-size="15.969" fill="var(--text-muted)" font-family="Arial, sans-serif">- Traffic splitting (canary deployments)</text>
  <text x="136.7742" y="201.9167" font-size="15.969" fill="var(--text-muted)" font-family="Arial, sans-serif">- Retries, timeouts, circuit breaking</text>
  <rect x="98.0645" y="239.375" width="1083.8709" height="102.7083" rx="6" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="136.7742" y="269.5833" font-size="18.6305" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Security:</text>
  <text x="136.7742" y="293.75" font-size="15.969" fill="var(--text-muted)" font-family="Arial, sans-serif">- Mutual TLS (mTLS) between all services</text>
  <text x="136.7742" y="314.2917" font-size="15.969" fill="var(--text-muted)" font-family="Arial, sans-serif">- Certificate management (automatic rotation) &amp; access policies</text>
  <rect x="98.0645" y="360.2083" width="1083.8709" height="102.7083" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="136.7742" y="390.4167" font-size="18.6305" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Observability:</text>
  <text x="136.7742" y="414.5833" font-size="15.969" fill="var(--text-muted)" font-family="Arial, sans-serif">- Distributed tracing (Jaeger, Zipkin)</text>
  <text x="136.7742" y="435.125" font-size="15.969" fill="var(--text-muted)" font-family="Arial, sans-serif">- Metrics (latency, error rates, throughput) &amp; dependency graphs</text>
  <rect x="98.0645" y="481.0417" width="1083.8709" height="102.7083" rx="6" fill="url(#grad-danger)" stroke="var(--danger-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="136.7742" y="511.25" font-size="18.6305" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Resilience:</text>
  <text x="136.7742" y="535.4167" font-size="15.969" fill="var(--text-muted)" font-family="Arial, sans-serif">- Fault injection (chaos testing)</text>
  <text x="136.7742" y="555.9583" font-size="15.969" fill="var(--text-muted)" font-family="Arial, sans-serif">- Rate limiting &amp; health checking</text>
</svg>
