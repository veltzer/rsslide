<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Arial, sans-serif" style="background:var(--bg)">
  <metadata>
    <type>regular</type>
  </metadata>
  <rect x="40" y="40" width="1199.9999" height="580" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="639.9999" y="89.5123" text-anchor="middle" font-size="24.003" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">User Space</text>
  <rect x="112.7273" y="117.8049" width="272.7272" height="70.7317" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="249.0909" y="160.244" text-anchor="middle" font-size="21.0026" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Cilium</text>
  <rect x="494.5454" y="117.8049" width="272.7272" height="70.7317" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="630.909" y="160.244" text-anchor="middle" font-size="21.0026" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">bpftrace</text>
  <rect x="876.3636" y="117.8049" width="272.7272" height="70.7317" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="1012.7272" y="160.244" text-anchor="middle" font-size="21.0026" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">tc + BPF</text>
  <line x1="40" y1="230.9757" x2="1240" y2="230.9757" stroke="var(--primary-border)" stroke-width="2" stroke-dasharray="8.9302 4.4651"/>
  <text x="639.9999" y="570.4878" text-anchor="middle" font-size="24.003" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Kernel Space</text>
  <line x1="249.0909" y1="188.5366" x2="249.0909" y2="259.2683" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <line x1="630.909" y1="188.5366" x2="630.909" y2="259.2683" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <line x1="1012.7272" y1="188.5366" x2="1012.7272" y2="259.2683" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <rect x="112.7273" y="259.2683" width="1054.5453" height="91.9512" rx="6" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="639.9999" y="294.6342" text-anchor="middle" font-size="22.5028" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">eBPF Virtual Machine</text>
  <text x="639.9999" y="330" text-anchor="middle" font-size="18.0023" fill="var(--text-muted)" font-family="Arial, sans-serif">(verified, sandboxed programs)</text>
  <line x1="249.0909" y1="351.2195" x2="249.0909" y2="407.8049" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <line x1="630.909" y1="351.2195" x2="630.909" y2="407.8049" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <line x1="1012.7272" y1="351.2195" x2="1012.7272" y2="407.8049" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <rect x="112.7273" y="407.8049" width="272.7272" height="106.0975" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="249.0909" y="447.4146" text-anchor="middle" font-size="21.0026" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">XDP</text>
  <text x="249.0909" y="475.7073" text-anchor="middle" font-size="18.0023" fill="var(--text-muted)" font-family="Arial, sans-serif">(packet filter)</text>
  <rect x="494.5454" y="407.8049" width="272.7272" height="106.0975" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="630.909" y="447.4146" text-anchor="middle" font-size="21.0026" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Traffic Control</text>
  <text x="630.909" y="475.7073" text-anchor="middle" font-size="18.0023" fill="var(--text-muted)" font-family="Arial, sans-serif">(tc)</text>
  <rect x="876.3636" y="407.8049" width="272.7272" height="106.0975" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="1012.7272" y="447.4146" text-anchor="middle" font-size="21.0026" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Socket Filter</text>
  <defs>
    <style id="palette-vars">
      :root, svg {
        --bg: #ffffff;
        --surface: #c4cdd6;
        --border: #6b7280;
        --text: #212121;
        --text-muted: #555555;
        --text-faint: #888888;
        --code-bg: #1a1a2e;
        --shadow: #00000044;
        --black: #000000;
        --primary-fill: #5a7a9c;
        --primary-border: #3d5a7d;
        --primary-text: #ffffff;
        --primary-accent: #243b59;
        --ok-fill: #7a9a6a;
        --ok-border: #5a7a4d;
        --ok-text: #ffffff;
        --ok-accent: #385030;
        --warn-fill: #c8924a;
        --warn-border: #9c6e2e;
        --warn-text: #ffffff;
        --warn-accent: #5a3f12;
        --danger-fill: #a86058;
        --danger-border: #7d3f38;
        --danger-text: #ffffff;
        --danger-accent: #4a1f1a;
        --info-fill: #7c6a8e;
        --info-border: #574a68;
        --info-text: #ffffff;
        --info-accent: #2f253b;
      }
    </style>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7493b3"/>
      <stop offset="100%" stop-color="#3d5a7d"/>
    </linearGradient>

    <linearGradient id="grad-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4cdd6"/>
    </linearGradient>

    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94b384"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>

    <linearGradient id="grad-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dba868"/>
      <stop offset="100%" stop-color="#9c6e2e"/>
    </linearGradient>

    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd7d75"/>
      <stop offset="100%" stop-color="#7d3f38"/>
    </linearGradient>

    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9384a5"/>
      <stop offset="100%" stop-color="#574a68"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000044"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#555555"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#3d5a7d"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#5a7a4d"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9c6e2e"/>
    </marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#7d3f38"/>
    </marker>
    <marker id="arrow-info" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#574a68"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#ffffff"/>
    </marker>
  </defs>
</svg>
