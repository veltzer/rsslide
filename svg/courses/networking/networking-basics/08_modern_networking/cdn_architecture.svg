<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Arial, sans-serif" style="background:var(--bg)">
  <metadata>
    <type>regular</type>
  </metadata>
  <defs>
    <style id="palette-vars">
      :root, svg {
        --bg: #ffffff;
        --surface: #c4cdd6;
        --border: #6b7280;
        --text: #212121;
        --text-muted: #555555;
        --text-faint: #888888;
        --code-bg: #1a1a2e;
        --shadow: #00000044;
        --black: #000000;
        --primary-fill: #5a7a9c;
        --primary-border: #3d5a7d;
        --primary-text: #ffffff;
        --primary-accent: #243b59;
        --ok-fill: #7a9a6a;
        --ok-border: #5a7a4d;
        --ok-text: #ffffff;
        --ok-accent: #385030;
        --warn-fill: #c8924a;
        --warn-border: #9c6e2e;
        --warn-text: #ffffff;
        --warn-accent: #5a3f12;
        --danger-fill: #a86058;
        --danger-border: #7d3f38;
        --danger-text: #ffffff;
        --danger-accent: #4a1f1a;
        --info-fill: #7c6a8e;
        --info-border: #574a68;
        --info-text: #ffffff;
        --info-accent: #2f253b;
      }
    </style>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7493b3"/>
      <stop offset="100%" stop-color="#3d5a7d"/>
    </linearGradient>

    <linearGradient id="grad-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4cdd6"/>
    </linearGradient>

    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94b384"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>

    <linearGradient id="grad-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dba868"/>
      <stop offset="100%" stop-color="#9c6e2e"/>
    </linearGradient>

    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd7d75"/>
      <stop offset="100%" stop-color="#7d3f38"/>
    </linearGradient>

    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9384a5"/>
      <stop offset="100%" stop-color="#574a68"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000044"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#555555"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#3d5a7d"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#5a7a4d"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9c6e2e"/>
    </marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#7d3f38"/>
    </marker>
    <marker id="arrow-info" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#574a68"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#ffffff"/>
    </marker>
  </defs>
  <text x="640" y="40" text-anchor="middle" font-size="27.0936" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">CDN Architecture</text>
  <rect x="489.9999" y="67.619" width="300.0001" height="75.9524" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="98" text-anchor="middle" font-size="19.5676" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">Origin Server</text>
  <text x="640" y="125.619" text-anchor="middle" font-size="16.5571" fill="var(--text-muted)" font-family="Arial, sans-serif">(your server)</text>
  <line x1="540" y1="143.5714" x2="200" y2="247.1428" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <line x1="640" y1="143.5714" x2="640" y2="247.1428" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <line x1="740.0001" y1="143.5714" x2="1080.0001" y2="247.1428" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <rect x="40" y="254.0476" width="320" height="75.9524" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="200" y="284.4286" text-anchor="middle" font-size="19.5676" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">CDN Edge</text>
  <text x="200" y="312.0476" text-anchor="middle" font-size="16.5571" fill="var(--text-muted)" font-family="Arial, sans-serif">US-East</text>
  <rect x="480" y="254.0476" width="320" height="75.9524" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="284.4286" text-anchor="middle" font-size="19.5676" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">CDN Edge</text>
  <text x="640" y="312.0476" text-anchor="middle" font-size="16.5571" fill="var(--text-muted)" font-family="Arial, sans-serif">Europe</text>
  <rect x="920" y="254.0476" width="320" height="75.9524" rx="6" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="1080.0001" y="284.4286" text-anchor="middle" font-size="19.5676" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">CDN Edge</text>
  <text x="1080.0001" y="312.0476" text-anchor="middle" font-size="16.5571" fill="var(--text-muted)" font-family="Arial, sans-serif">Asia</text>
  <line x1="200" y1="330" x2="200" y2="426.6667" stroke="var(--ok-border)" stroke-width="2" marker-end="url(#arrow-ok)"/>
  <line x1="640" y1="330" x2="640" y2="426.6667" stroke="var(--ok-border)" stroke-width="2" marker-end="url(#arrow-ok)"/>
  <line x1="1080.0001" y1="330" x2="1080.0001" y2="426.6667" stroke="var(--ok-border)" stroke-width="2" marker-end="url(#arrow-ok)"/>
  <rect x="40" y="433.5714" width="320" height="89.7619" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="200" y="468.0953" text-anchor="middle" font-size="19.5676" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">US Users</text>
  <text x="200" y="495.7143" text-anchor="middle" font-size="18.0624" fill="var(--ok-accent)" font-weight="bold" font-family="Arial, sans-serif">~5ms</text>
  <rect x="480" y="433.5714" width="320" height="89.7619" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="468.0953" text-anchor="middle" font-size="19.5676" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">EU Users</text>
  <text x="640" y="495.7143" text-anchor="middle" font-size="18.0624" fill="var(--ok-accent)" font-weight="bold" font-family="Arial, sans-serif">~10ms</text>
  <rect x="920" y="433.5714" width="320" height="89.7619" rx="6" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="1080.0001" y="468.0953" text-anchor="middle" font-size="19.5676" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">AS Users</text>
  <text x="1080.0001" y="495.7143" text-anchor="middle" font-size="18.0624" fill="var(--ok-accent)" font-weight="bold" font-family="Arial, sans-serif">~15ms</text>
  <rect x="240" y="564.7619" width="800.0002" height="55.2381" rx="6" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="599.2857" text-anchor="middle" font-size="19.5676" fill="var(--danger-accent)" font-weight="bold" font-family="Arial, sans-serif">vs ~200ms to origin from all locations</text>
</svg>
