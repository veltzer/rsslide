<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" style="background:var(--bg)">
  <metadata>
    <type>regular</type>
  </metadata>
  <defs>
    <style id="palette-vars">
      :root, svg {
        --bg: #ffffff;
        --surface: #c4cdd6;
        --border: #6b7280;
        --text: #212121;
        --text-muted: #555555;
        --text-faint: #888888;
        --code-bg: #1a1a2e;
        --shadow: #00000044;
        --black: #000000;
        --primary-fill: #5a7a9c;
        --primary-border: #3d5a7d;
        --primary-text: #ffffff;
        --primary-accent: #243b59;
        --ok-fill: #7a9a6a;
        --ok-border: #5a7a4d;
        --ok-text: #ffffff;
        --ok-accent: #385030;
        --warn-fill: #c8924a;
        --warn-border: #9c6e2e;
        --warn-text: #ffffff;
        --warn-accent: #5a3f12;
        --danger-fill: #a86058;
        --danger-border: #7d3f38;
        --danger-text: #ffffff;
        --danger-accent: #4a1f1a;
        --info-fill: #7c6a8e;
        --info-border: #574a68;
        --info-text: #ffffff;
        --info-accent: #2f253b;
      }
    </style>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7493b3"/>
      <stop offset="100%" stop-color="#3d5a7d"/>
    </linearGradient>

    <linearGradient id="grad-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4cdd6"/>
    </linearGradient>

    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94b384"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>

    <linearGradient id="grad-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dba868"/>
      <stop offset="100%" stop-color="#9c6e2e"/>
    </linearGradient>

    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd7d75"/>
      <stop offset="100%" stop-color="#7d3f38"/>
    </linearGradient>

    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9384a5"/>
      <stop offset="100%" stop-color="#574a68"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000044"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#555555"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#3d5a7d"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#5a7a4d"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9c6e2e"/>
    </marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#7d3f38"/>
    </marker>
    <marker id="arrow-info" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#574a68"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#ffffff"/>
    </marker>
  </defs>
  <rect x="40" y="40" width="300" height="486.4516" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="190" y="133.5484" text-anchor="middle" font-size="26.158" font-weight="bold" font-family="Arial, sans-serif" fill="var(--primary-text)">Client (Browser)</text>
  <text x="190" y="227.0968" text-anchor="middle" font-size="21.7983" font-family="Arial, sans-serif" fill="var(--primary-text)">GET /index.html</text>
  <text x="190" y="283.2257" text-anchor="middle" font-size="21.7983" font-family="Arial, sans-serif" fill="var(--primary-text)">Host: example.com</text>
  <text x="190" y="339.3548" text-anchor="middle" font-size="21.7983" font-family="Arial, sans-serif" fill="var(--primary-text)">Accept: text/html</text>
  <text x="190" y="414.1935" text-anchor="middle" font-size="21.7983" fill="var(--text-muted)" font-family="Arial, sans-serif">Port 80 / 443</text>
  <rect x="918.5714" y="40" width="321.4286" height="486.4516" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="1079.2857" y="133.5484" text-anchor="middle" font-size="26.158" font-weight="bold" font-family="Arial, sans-serif" fill="var(--ok-text)">Server</text>
  <text x="1079.2857" y="227.0968" text-anchor="middle" font-size="21.7983" font-family="Arial, sans-serif" fill="var(--ok-text)">HTTP/1.1 200 OK</text>
  <text x="1079.2857" y="283.2257" text-anchor="middle" font-size="21.7983" font-family="Arial, sans-serif" fill="var(--ok-text)">Content-Type: text/html</text>
  <text x="1079.2857" y="339.3548" text-anchor="middle" font-size="21.7983" font-family="Arial, sans-serif" fill="var(--ok-text)">Content-Length: 1234</text>
  <text x="1079.2857" y="414.1935" text-anchor="middle" font-size="21.7983" fill="var(--text-muted)" font-family="Arial, sans-serif">&lt;html&gt;...&lt;/html&gt;</text>
  <line x1="340" y1="189.6774" x2="918.5714" y2="189.6774" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <text x="640" y="163.4838" text-anchor="middle" font-size="23.9782" fill="var(--primary-accent)" font-weight="bold" font-family="Arial, sans-serif">HTTP Request</text>
  <line x1="918.5714" y1="376.7741" x2="340" y2="376.7741" stroke="var(--ok-border)" stroke-width="2" stroke-dasharray="10.2503 6.1502" marker-end="url(#arrow-ok)"/>
  <text x="640" y="451.6129" text-anchor="middle" font-size="23.9782" fill="var(--ok-accent)" font-weight="bold" font-family="Arial, sans-serif">HTTP Response</text>
  <text x="640" y="620" text-anchor="middle" font-size="21.7983" fill="var(--text-muted)" font-family="Arial, sans-serif">Stateless request-response protocol over TCP</text>
</svg>
