<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" style="background:var(--bg)">
  <metadata>
    <type>regular</type>
  </metadata>
  <defs>
    <style id="palette-vars">
      :root, svg {
        --bg: #ffffff;
        --surface: #c4cdd6;
        --border: #6b7280;
        --text: #212121;
        --text-muted: #555555;
        --text-faint: #888888;
        --code-bg: #1a1a2e;
        --shadow: #00000044;
        --black: #000000;
        --primary-fill: #5a7a9c;
        --primary-border: #3d5a7d;
        --primary-text: #ffffff;
        --primary-accent: #243b59;
        --ok-fill: #7a9a6a;
        --ok-border: #5a7a4d;
        --ok-text: #ffffff;
        --ok-accent: #385030;
        --warn-fill: #c8924a;
        --warn-border: #9c6e2e;
        --warn-text: #ffffff;
        --warn-accent: #5a3f12;
        --danger-fill: #a86058;
        --danger-border: #7d3f38;
        --danger-text: #ffffff;
        --danger-accent: #4a1f1a;
        --info-fill: #7c6a8e;
        --info-border: #574a68;
        --info-text: #ffffff;
        --info-accent: #2f253b;
      }
    </style>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7493b3"/>
      <stop offset="100%" stop-color="#3d5a7d"/>
    </linearGradient>

    <linearGradient id="grad-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4cdd6"/>
    </linearGradient>

    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94b384"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>

    <linearGradient id="grad-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dba868"/>
      <stop offset="100%" stop-color="#9c6e2e"/>
    </linearGradient>

    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd7d75"/>
      <stop offset="100%" stop-color="#7d3f38"/>
    </linearGradient>

    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9384a5"/>
      <stop offset="100%" stop-color="#574a68"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000044"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#555555"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#3d5a7d"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#5a7a4d"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9c6e2e"/>
    </marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#7d3f38"/>
    </marker>
    <marker id="arrow-info" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#574a68"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#ffffff"/>
    </marker>
  </defs>
  <rect x="40" y="40" width="235.7144" height="580" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="157.8571" y="119.75" text-anchor="middle" font-size="25.7461" font-weight="bold" font-family="Arial, sans-serif" fill="var(--primary-text)">Client</text>
  <text x="157.8571" y="185" text-anchor="middle" font-size="21.455" font-family="Arial, sans-serif" fill="var(--primary-text)">Single TCP</text>
  <text x="157.8571" y="239.375" text-anchor="middle" font-size="21.455" font-family="Arial, sans-serif" fill="var(--primary-text)">Connection</text>
  <rect x="982.8571" y="40" width="257.1429" height="580" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="1111.4285" y="119.75" text-anchor="middle" font-size="25.7461" font-weight="bold" font-family="Arial, sans-serif" fill="var(--ok-text)">Server</text>
  <rect x="382.8571" y="76.25" width="492.8572" height="90.625" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="468.5714" y="137.875" text-anchor="middle" font-size="21.455" fill="var(--primary-accent)" font-family="Arial, sans-serif">Stream 1: GET /page</text>
  <line x1="682.8571" y1="119.75" x2="875.7143" y2="119.75" stroke="var(--primary-border)" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <rect x="382.8571" y="185" width="492.8572" height="90.625" fill="url(#grad-info)" stroke="var(--info-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="468.5714" y="246.625" text-anchor="middle" font-size="21.455" fill="var(--info-accent)" font-family="Arial, sans-serif">Stream 2: GET /style.css</text>
  <line x1="682.8571" y1="228.5" x2="875.7143" y2="228.5" stroke="var(--info-border)" stroke-width="2" marker-end="url(#arrow-info)"/>
  <rect x="382.8571" y="293.75" width="492.8572" height="90.625" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="468.5714" y="355.375" text-anchor="middle" font-size="21.455" fill="var(--ok-accent)" font-family="Arial, sans-serif">Stream 3: GET /app.js</text>
  <line x1="682.8571" y1="337.25" x2="875.7143" y2="337.25" stroke="var(--ok-border)" stroke-width="2" marker-end="url(#arrow-ok)"/>
  <rect x="382.8571" y="402.5" width="492.8572" height="90.625" fill="url(#grad-danger)" stroke="var(--danger-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="468.5714" y="464.125" text-anchor="middle" font-size="21.455" fill="var(--danger-accent)" font-family="Arial, sans-serif">Stream 4: GET /image.png</text>
  <line x1="682.8571" y1="446" x2="875.7143" y2="446" stroke="var(--danger-border)" stroke-width="2" marker-end="url(#arrow-danger)"/>
  <text x="629.2857" y="565.625" text-anchor="middle" font-size="21.455" fill="var(--text-muted)" font-family="Arial, sans-serif">All streams multiplexed over single connection</text>
  <text x="629.2857" y="620" text-anchor="middle" font-size="21.455" fill="var(--text-muted)" font-family="Arial, sans-serif">Binary framing + HPACK header compression</text>
</svg>
