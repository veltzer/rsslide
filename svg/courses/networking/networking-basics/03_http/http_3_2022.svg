<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" style="background:var(--bg)">
  <metadata>
    <type>regular</type>
  </metadata>
  <defs>
    <style id="palette-vars">
      :root, svg {
        --bg: #ffffff;
        --surface: #c4cdd6;
        --border: #6b7280;
        --text: #212121;
        --text-muted: #555555;
        --text-faint: #888888;
        --code-bg: #1a1a2e;
        --shadow: #00000044;
        --black: #000000;
        --primary-fill: #5a7a9c;
        --primary-border: #3d5a7d;
        --primary-text: #ffffff;
        --primary-accent: #243b59;
        --ok-fill: #7a9a6a;
        --ok-border: #5a7a4d;
        --ok-text: #ffffff;
        --ok-accent: #385030;
        --warn-fill: #c8924a;
        --warn-border: #9c6e2e;
        --warn-text: #ffffff;
        --warn-accent: #5a3f12;
        --danger-fill: #a86058;
        --danger-border: #7d3f38;
        --danger-text: #ffffff;
        --danger-accent: #4a1f1a;
        --info-fill: #7c6a8e;
        --info-border: #574a68;
        --info-text: #ffffff;
        --info-accent: #2f253b;
      }
    </style>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7493b3"/>
      <stop offset="100%" stop-color="#3d5a7d"/>
    </linearGradient>

    <linearGradient id="grad-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4cdd6"/>
    </linearGradient>

    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94b384"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>

    <linearGradient id="grad-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dba868"/>
      <stop offset="100%" stop-color="#9c6e2e"/>
    </linearGradient>

    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd7d75"/>
      <stop offset="100%" stop-color="#7d3f38"/>
    </linearGradient>

    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9384a5"/>
      <stop offset="100%" stop-color="#574a68"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000044"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#555555"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#3d5a7d"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#5a7a4d"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9c6e2e"/>
    </marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#7d3f38"/>
    </marker>
    <marker id="arrow-info" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#574a68"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#ffffff"/>
    </marker>
  </defs>
  <text x="640" y="40" text-anchor="middle" font-size="30.7993" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">HTTP/3 Protocol Stack</text>
  <rect x="230.9091" y="81.6766" width="818.1818" height="121.5569" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="640" y="158.0838" text-anchor="middle" font-size="28.4302" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">HTTP/3 (Application)</text>
  <rect x="230.9091" y="220.5988" width="818.1818" height="121.5569" fill="url(#grad-info)" stroke="var(--info-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="640" y="297.006" text-anchor="middle" font-size="28.4302" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">QPACK (Header Compression)</text>
  <rect x="230.9091" y="359.5209" width="818.1818" height="121.5569" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="640" y="435.9281" text-anchor="middle" font-size="28.4302" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">QUIC (Transport + TLS 1.3)</text>
  <rect x="230.9091" y="498.4431" width="818.1818" height="121.5569" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="640" y="574.8503" text-anchor="middle" font-size="28.4302" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">UDP</text>
  <text x="1240" y="158.0838" text-anchor="middle" font-size="23.6918" fill="var(--text-muted)" font-family="Arial, sans-serif">Semantics</text>
  <text x="1240" y="297.006" text-anchor="middle" font-size="23.6918" fill="var(--text-muted)" font-family="Arial, sans-serif">Compression</text>
  <text x="1240" y="435.9281" text-anchor="middle" font-size="23.6918" fill="var(--text-muted)" font-family="Arial, sans-serif">Reliability + Encryption</text>
  <text x="1240" y="574.8503" text-anchor="middle" font-size="23.6918" fill="var(--text-muted)" font-family="Arial, sans-serif">Datagrams</text>
  <text x="40" y="297.006" text-anchor="middle" font-size="23.6918" fill="var(--danger-accent)" font-family="Arial, sans-serif">No TCP!</text>
  <text x="40" y="366.4671" text-anchor="middle" font-size="23.6918" fill="var(--danger-accent)" font-family="Arial, sans-serif">No HOL</text>
  <text x="40" y="418.5629" text-anchor="middle" font-size="23.6918" fill="var(--danger-accent)" font-family="Arial, sans-serif">blocking</text>
</svg>
