<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Arial, sans-serif" style="background:var(--bg)">
  <metadata>
    <type>regular</type>
  </metadata>
  <defs>
    <style id="palette-vars">
      :root, svg {
        --bg: #ffffff;
        --surface: #c4cdd6;
        --border: #6b7280;
        --text: #212121;
        --text-muted: #555555;
        --text-faint: #888888;
        --code-bg: #1a1a2e;
        --shadow: #00000044;
        --black: #000000;
        --primary-fill: #5a7a9c;
        --primary-border: #3d5a7d;
        --primary-text: #ffffff;
        --primary-accent: #243b59;
        --ok-fill: #7a9a6a;
        --ok-border: #5a7a4d;
        --ok-text: #ffffff;
        --ok-accent: #385030;
        --warn-fill: #c8924a;
        --warn-border: #9c6e2e;
        --warn-text: #ffffff;
        --warn-accent: #5a3f12;
        --danger-fill: #a86058;
        --danger-border: #7d3f38;
        --danger-text: #ffffff;
        --danger-accent: #4a1f1a;
        --info-fill: #7c6a8e;
        --info-border: #574a68;
        --info-text: #ffffff;
        --info-accent: #2f253b;
      }
    </style>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7493b3"/>
      <stop offset="100%" stop-color="#3d5a7d"/>
    </linearGradient>

    <linearGradient id="grad-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4cdd6"/>
    </linearGradient>

    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94b384"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>

    <linearGradient id="grad-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dba868"/>
      <stop offset="100%" stop-color="#9c6e2e"/>
    </linearGradient>

    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd7d75"/>
      <stop offset="100%" stop-color="#7d3f38"/>
    </linearGradient>

    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9384a5"/>
      <stop offset="100%" stop-color="#574a68"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000044"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#555555"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#3d5a7d"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#5a7a4d"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9c6e2e"/>
    </marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#7d3f38"/>
    </marker>
    <marker id="arrow-info" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#574a68"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#ffffff"/>
    </marker>
  </defs>

  <text x="640" y="40" text-anchor="middle" font-size="26.821872" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">TCP Socket Lifecycle</text>

  <rect x="60" y="61.284404" width="220" height="63.853211" rx="6.189663" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="170" y="101.724771" text-anchor="middle" font-size="22.695431" font-weight="bold" fill="var(--primary-text)" font-family="Arial, sans-serif">Server</text>

  <rect x="1000" y="61.284404" width="220" height="63.853211" rx="6.189663" fill="url(#grad-info)" stroke="var(--info-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="1110" y="101.724771" text-anchor="middle" font-size="22.695431" font-weight="bold" fill="var(--info-text)" font-family="Arial, sans-serif">Client</text>

  <line x1="170" y1="135.779817" x2="170" y2="620" stroke="var(--text-faint)" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="1110" y1="135.779817" x2="1110" y2="620" stroke="var(--text-faint)" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- server steps -->
  <rect x="40" y="151.743119" width="260" height="46.825688" rx="6.189663" fill="var(--surface)" stroke="var(--border)" stroke-width="2"/>
  <text x="170" y="182.605505" text-anchor="middle" font-size="18.568989" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">socket() → bind()</text>

  <rect x="40" y="210.275229" width="260" height="46.825688" rx="6.189663" fill="var(--surface)" stroke="var(--border)" stroke-width="2"/>
  <text x="170" y="241.137615" text-anchor="middle" font-size="18.568989" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">listen()</text>

  <rect x="40" y="268.807339" width="260" height="46.825688" rx="6.189663" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="170" y="299.669725" text-anchor="middle" font-size="18.568989" font-weight="bold" fill="var(--ok-text)" font-family="Arial, sans-serif">accept()</text>

  <!-- client steps -->
  <rect x="980" y="151.743119" width="260" height="46.825688" rx="6.189663" fill="var(--surface)" stroke="var(--border)" stroke-width="2"/>
  <text x="1110" y="182.605505" text-anchor="middle" font-size="18.568989" font-weight="bold" fill="var(--text)" font-family="Arial, sans-serif">socket()</text>

  <rect x="980" y="268.807339" width="260" height="46.825688" rx="6.189663" fill="url(#grad-ok)" stroke="var(--ok-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="1110" y="299.669725" text-anchor="middle" font-size="18.568989" font-weight="bold" fill="var(--ok-text)" font-family="Arial, sans-serif">connect()</text>

  <!-- 3-way handshake -->
  <line x1="300" y1="343.302752" x2="980" y2="343.302752" stroke="var(--text-muted)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="640" y="335.853211" text-anchor="middle" font-size="16.505768" font-style="italic" fill="var(--text-muted)" font-family="Arial, sans-serif">SYN</text>
  <line x1="980" y1="375.229358" x2="300" y2="375.229358" stroke="var(--text-muted)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="640" y="367.779817" text-anchor="middle" font-size="16.505768" font-style="italic" fill="var(--text-muted)" font-family="Arial, sans-serif">SYN + ACK</text>
  <line x1="300" y1="407.155963" x2="980" y2="407.155963" stroke="var(--text-muted)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="640" y="399.706422" text-anchor="middle" font-size="16.505768" font-style="italic" fill="var(--text-muted)" font-family="Arial, sans-serif">ACK — connection established</text>

  <!-- data exchange -->
  <rect x="40" y="433.761468" width="260" height="46.825688" rx="6.189663" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="170" y="464.623853" text-anchor="middle" font-size="18.568989" font-weight="bold" fill="var(--primary-text)" font-family="Arial, sans-serif">recv() / send()</text>
  <rect x="980" y="433.761468" width="260" height="46.825688" rx="6.189663" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="1110" y="464.623853" text-anchor="middle" font-size="18.568989" font-weight="bold" fill="var(--primary-text)" font-family="Arial, sans-serif">send() / recv()</text>

  <line x1="980" y1="502.93578" x2="300" y2="502.93578" stroke="var(--text-muted)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="640" y="495.486239" text-anchor="middle" font-size="16.505768" font-style="italic" fill="var(--text-muted)" font-family="Arial, sans-serif">request bytes</text>

  <line x1="300" y1="540.183486" x2="980" y2="540.183486" stroke="var(--text-muted)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="640" y="532.733945" text-anchor="middle" font-size="16.505768" font-style="italic" fill="var(--text-muted)" font-family="Arial, sans-serif">response bytes</text>

  <!-- close -->
  <rect x="40" y="561.46789" width="260" height="46.825688" rx="6.189663" fill="url(#grad-danger)" stroke="var(--danger-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="170" y="592.330275" text-anchor="middle" font-size="18.568989" font-weight="bold" fill="var(--danger-text)" font-family="Arial, sans-serif">close()</text>
  <rect x="980" y="561.46789" width="260" height="46.825688" rx="6.189663" fill="url(#grad-danger)" stroke="var(--danger-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="1110" y="592.330275" text-anchor="middle" font-size="18.568989" font-weight="bold" fill="var(--danger-text)" font-family="Arial, sans-serif">close()</text>

  <line x1="300" y1="620" x2="980" y2="620" stroke="var(--text-muted)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="640" y="612.550459" text-anchor="middle" font-size="16.505768" font-style="italic" fill="var(--text-muted)" font-family="Arial, sans-serif">FIN handshake (FIN / ACK / FIN / ACK)</text>
</svg>
