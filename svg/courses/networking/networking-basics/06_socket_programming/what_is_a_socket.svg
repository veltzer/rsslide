<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="sans-serif" style="background:var(--bg)">
  <metadata>
    <type>regular</type>
  </metadata>
  <defs>
    <style id="palette-vars">
      :root, svg {
        --bg: #ffffff;
        --surface: #c4cdd6;
        --border: #6b7280;
        --text: #212121;
        --text-muted: #555555;
        --text-faint: #888888;
        --code-bg: #1a1a2e;
        --shadow: #00000044;
        --black: #000000;
        --primary-fill: #5a7a9c;
        --primary-border: #3d5a7d;
        --primary-text: #ffffff;
        --primary-accent: #243b59;
        --ok-fill: #7a9a6a;
        --ok-border: #5a7a4d;
        --ok-text: #ffffff;
        --ok-accent: #385030;
        --warn-fill: #c8924a;
        --warn-border: #9c6e2e;
        --warn-text: #ffffff;
        --warn-accent: #5a3f12;
        --danger-fill: #a86058;
        --danger-border: #7d3f38;
        --danger-text: #ffffff;
        --danger-accent: #4a1f1a;
        --info-fill: #7c6a8e;
        --info-border: #574a68;
        --info-text: #ffffff;
        --info-accent: #2f253b;
      }
    </style>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7493b3"/>
      <stop offset="100%" stop-color="#3d5a7d"/>
    </linearGradient>

    <linearGradient id="grad-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4cdd6"/>
    </linearGradient>

    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94b384"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>

    <linearGradient id="grad-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dba868"/>
      <stop offset="100%" stop-color="#9c6e2e"/>
    </linearGradient>

    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd7d75"/>
      <stop offset="100%" stop-color="#7d3f38"/>
    </linearGradient>

    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9384a5"/>
      <stop offset="100%" stop-color="#574a68"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000044"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#555555"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#3d5a7d"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#5a7a4d"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9c6e2e"/>
    </marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#7d3f38"/>
    </marker>
    <marker id="arrow-info" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#574a68"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#ffffff"/>
    </marker>
  </defs>
  <text x="640.0001" y="40" text-anchor="middle" font-size="26.0578" fill="var(--text)" font-weight="bold" font-family="Arial, sans-serif">Socket: Endpoint for Network Communication</text>
  <rect x="40" y="83.8655" width="468.75" height="536.1345" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="274.375" y="142.3529" text-anchor="middle" font-size="24.1966" fill="var(--text)" font-weight="bold" font-family="Arial, sans-serif">Server Application</text>
  <text x="274.375" y="205.7143" text-anchor="middle" font-size="22.3352" fill="var(--text)" font-family="Arial, sans-serif">socket()</text>
  <text x="274.375" y="259.3278" text-anchor="middle" font-size="22.3352" fill="var(--text)" font-family="Arial, sans-serif">bind()</text>
  <text x="274.375" y="312.9412" text-anchor="middle" font-size="22.3352" fill="var(--text)" font-family="Arial, sans-serif">listen()</text>
  <text x="274.375" y="366.5546" text-anchor="middle" font-size="22.3352" fill="var(--text)" font-family="Arial, sans-serif">accept()</text>
  <rect x="115" y="498.1513" width="318.75" height="87.7311" fill="var(--text-muted)" stroke="var(--primary-border)" stroke-width="2.7994" rx="6"/>
  <text x="274.375" y="551.7648" text-anchor="middle" font-size="22.3352" fill="var(--primary-accent)" font-weight="bold" font-family="Arial, sans-serif">Socket  fd = 3</text>
  <rect x="771.25" y="83.8655" width="468.75" height="536.1345" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="1005.625" y="142.3529" text-anchor="middle" font-size="24.1966" fill="var(--text)" font-weight="bold" font-family="Arial, sans-serif">Client Application</text>
  <text x="1005.625" y="205.7143" text-anchor="middle" font-size="22.3352" fill="var(--text)" font-family="Arial, sans-serif">socket()</text>
  <text x="1005.625" y="259.3278" text-anchor="middle" font-size="22.3352" fill="var(--text)" font-family="Arial, sans-serif">connect()</text>
  <text x="1005.625" y="312.9412" text-anchor="middle" font-size="22.3352" fill="var(--text)" font-family="Arial, sans-serif">send()</text>
  <text x="1005.625" y="366.5546" text-anchor="middle" font-size="22.3352" fill="var(--text)" font-family="Arial, sans-serif">recv()</text>
  <rect x="846.25" y="498.1513" width="318.75" height="87.7311" fill="var(--text-muted)" stroke="var(--warn-border)" stroke-width="2.7994" rx="6"/>
  <text x="1005.625" y="551.7648" text-anchor="middle" font-size="22.3352" fill="var(--warn-accent)" font-weight="bold" font-family="Arial, sans-serif">Socket  fd = 3</text>
  <line x1="508.75" y1="542.0168" x2="771.25" y2="542.0168" stroke="var(--text-muted)" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="771.25" y1="517.6471" x2="508.75" y2="517.6471" stroke="var(--text-muted)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="640.0001" y="498.1513" text-anchor="middle" font-size="20.474" fill="var(--text-muted)" font-style="italic" font-family="Arial, sans-serif">Network (TCP/UDP)</text>
</svg>
