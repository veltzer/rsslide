<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" style="background:var(--bg)">
  <metadata>
    <type>regular</type>
  </metadata>
  <defs>
    <style id="palette-vars">
      :root, svg {
        --bg: #ffffff;
        --surface: #c4cdd6;
        --border: #6b7280;
        --text: #212121;
        --text-muted: #555555;
        --text-faint: #888888;
        --code-bg: #1a1a2e;
        --shadow: #00000044;
        --black: #000000;
        --primary-fill: #5a7a9c;
        --primary-border: #3d5a7d;
        --primary-text: #ffffff;
        --primary-accent: #243b59;
        --ok-fill: #7a9a6a;
        --ok-border: #5a7a4d;
        --ok-text: #ffffff;
        --ok-accent: #385030;
        --warn-fill: #c8924a;
        --warn-border: #9c6e2e;
        --warn-text: #ffffff;
        --warn-accent: #5a3f12;
        --danger-fill: #a86058;
        --danger-border: #7d3f38;
        --danger-text: #ffffff;
        --danger-accent: #4a1f1a;
        --info-fill: #7c6a8e;
        --info-border: #574a68;
        --info-text: #ffffff;
        --info-accent: #2f253b;
      }
    </style>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7493b3"/>
      <stop offset="100%" stop-color="#3d5a7d"/>
    </linearGradient>

    <linearGradient id="grad-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4cdd6"/>
    </linearGradient>

    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94b384"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>

    <linearGradient id="grad-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dba868"/>
      <stop offset="100%" stop-color="#9c6e2e"/>
    </linearGradient>

    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd7d75"/>
      <stop offset="100%" stop-color="#7d3f38"/>
    </linearGradient>

    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9384a5"/>
      <stop offset="100%" stop-color="#574a68"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000044"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#555555"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#3d5a7d"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#5a7a4d"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9c6e2e"/>
    </marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#7d3f38"/>
    </marker>
    <marker id="arrow-info" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#574a68"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#ffffff"/>
    </marker>
  </defs>

  <!-- Filter bar -->
  <rect x="40" y="40" width="1200" height="52.252252252252" rx="8.24721110845" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="60.338983050847" y="73.441441441441" font-size="15.463520828343" fill="var(--primary-text)" font-family="Courier New, monospace">Filter: tcp.port == 80 &amp;&amp; ip.addr == 10.0.0.5</text>

  <!-- Packet List pane -->
  <rect x="40" y="107.927927927928" width="1200" height="172.432432432432" rx="8.24721110845" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="60.338983050847" y="134.054054054054" font-size="14.432619439787" font-weight="bold" fill="var(--primary-text)" font-family="Courier New, monospace">No  Src            Dst             Proto  Info</text>
  <text x="60.338983050847" y="160.18018018018" font-size="14.432619439787" fill="var(--primary-text)" font-family="Courier New, monospace">1   10.0.0.5       93.184.216.34   TCP    SYN</text>
  <text x="60.338983050847" y="186.306306306306" font-size="14.432619439787" fill="var(--primary-text)" font-family="Courier New, monospace">2   93.184.216.34  10.0.0.5        TCP    SYN,ACK</text>
  <text x="60.338983050847" y="212.432432432432" font-size="14.432619439787" fill="var(--primary-text)" font-family="Courier New, monospace">3   10.0.0.5       93.184.216.34   TCP    ACK</text>
  <text x="60.338983050847" y="238.558558558559" font-size="14.432619439787" fill="var(--primary-text)" font-family="Courier New, monospace">4   10.0.0.5       93.184.216.34   HTTP   GET /</text>
  <text x="60.338983050847" y="264.684684684685" font-size="14.432619439787" fill="var(--primary-text)" font-family="Courier New, monospace">5   93.184.216.34  10.0.0.5        HTTP   200 OK</text>

  <!-- Protocol details pane -->
  <rect x="40" y="296.036036036036" width="1200" height="161.981981981982" rx="8.24721110845" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="60.338983050847" y="327.387387387387" font-size="15.463520828343" font-weight="bold" fill="var(--warn-text)" font-family="Arial, sans-serif">Frame 4: 214 bytes</text>
  <text x="60.338983050847" y="355.603603603604" font-size="13.401718051231" fill="var(--warn-text)" font-family="Courier New, monospace">Ethernet II</text>
  <text x="60.338983050847" y="379.63963963964" font-size="13.401718051231" fill="var(--warn-text)" font-family="Courier New, monospace">IP: src=10.0.0.5 dst=93.184.216.34</text>
  <text x="60.338983050847" y="403.675675675676" font-size="13.401718051231" fill="var(--warn-text)" font-family="Courier New, monospace">TCP: port 54321 → 80</text>
  <text x="60.338983050847" y="427.711711711712" font-size="13.401718051231" fill="var(--warn-text)" font-family="Courier New, monospace">HTTP: GET /</text>

  <!-- Hex pane -->
  <rect x="40" y="473.693693693694" width="1200" height="83.603603603604" rx="8.24721110845" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
  <text x="60.338983050847" y="505.045045045045" font-size="13.401718051231" fill="var(--text-muted)" font-family="Courier New, monospace">0000  52 54 00 ab cd ef 52 54  00 12 34 56 08 00 45 00</text>
  <text x="60.338983050847" y="536.396396396396" font-size="13.401718051231" fill="var(--text-muted)" font-family="Courier New, monospace">0010  00 c8 12 34 40 00 40 06  ...</text>

  <!-- Legend -->
  <rect x="40" y="572.972972972973" width="386.440677966102" height="47.027027027027" rx="6.185408331337" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="233.220338983051" y="602.234234234234" text-anchor="middle" font-size="14.432619439787" font-weight="bold" fill="var(--primary-text)" font-family="Arial, sans-serif">Packet List</text>

  <rect x="446.779661016949" y="572.972972972973" width="386.440677966102" height="47.027027027027" rx="6.185408331337" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="602.234234234234" text-anchor="middle" font-size="14.432619439787" font-weight="bold" fill="var(--warn-text)" font-family="Arial, sans-serif">Protocol Details</text>

  <rect x="853.559322033898" y="572.972972972973" width="386.440677966102" height="47.027027027027" rx="6.185408331337" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
  <text x="1046.779661016949" y="602.234234234234" text-anchor="middle" font-size="14.432619439787" font-weight="bold" fill="var(--text-muted)" font-family="Arial, sans-serif">Hex Dump</text>
</svg>
