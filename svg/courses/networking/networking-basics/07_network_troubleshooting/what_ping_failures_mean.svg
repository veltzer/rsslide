<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" style="background:var(--bg)">
  <metadata>
    <type>regular</type>
  </metadata>
  <defs>
    <style id="palette-vars">
      :root, svg {
        --bg: #ffffff;
        --surface: #c4cdd6;
        --border: #6b7280;
        --text: #212121;
        --text-muted: #555555;
        --text-faint: #888888;
        --code-bg: #1a1a2e;
        --shadow: #00000044;
        --black: #000000;
        --primary-fill: #5a7a9c;
        --primary-border: #3d5a7d;
        --primary-text: #ffffff;
        --primary-accent: #243b59;
        --ok-fill: #7a9a6a;
        --ok-border: #5a7a4d;
        --ok-text: #ffffff;
        --ok-accent: #385030;
        --warn-fill: #c8924a;
        --warn-border: #9c6e2e;
        --warn-text: #ffffff;
        --warn-accent: #5a3f12;
        --danger-fill: #a86058;
        --danger-border: #7d3f38;
        --danger-text: #ffffff;
        --danger-accent: #4a1f1a;
        --info-fill: #7c6a8e;
        --info-border: #574a68;
        --info-text: #ffffff;
        --info-accent: #2f253b;
      }
    </style>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7493b3"/>
      <stop offset="100%" stop-color="#3d5a7d"/>
    </linearGradient>

    <linearGradient id="grad-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4cdd6"/>
    </linearGradient>

    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94b384"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>

    <linearGradient id="grad-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dba868"/>
      <stop offset="100%" stop-color="#9c6e2e"/>
    </linearGradient>

    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd7d75"/>
      <stop offset="100%" stop-color="#7d3f38"/>
    </linearGradient>

    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9384a5"/>
      <stop offset="100%" stop-color="#574a68"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000044"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#555555"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#3d5a7d"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#5a7a4d"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9c6e2e"/>
    </marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#7d3f38"/>
    </marker>
    <marker id="arrow-info" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#574a68"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,2 L9,5 L1,8 Z" fill="#ffffff"/>
    </marker>
  </defs>

  <text x="640" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="27.480207192908" font-weight="bold" fill="var(--text)">Ping Failure Meanings</text>

  <rect x="40" y="72.954545454545" width="1200" height="98.863636363636" rx="8.455448367049" fill="url(#grad-danger)" stroke="var(--danger-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="70.508474576271" y="108.106060606061" font-family="Arial, sans-serif" font-size="19.02475882586" font-weight="bold" fill="var(--danger-text)">Destination Host Unreachable</text>
  <text x="70.508474576271" y="138.863636363636" font-family="Arial, sans-serif" font-size="14.797034642335" fill="var(--danger-text)">Gateway has no route to target</text>
  <text x="70.508474576271" y="163.030303030303" font-family="Arial, sans-serif" font-size="13.740103596454" fill="var(--danger-text)">Check: ip route</text>

  <rect x="40" y="185" width="1200" height="98.863636363636" rx="8.455448367049" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="70.508474576271" y="220.151515151515" font-family="Arial, sans-serif" font-size="19.02475882586" font-weight="bold" fill="var(--warn-text)">Request timed out</text>
  <text x="70.508474576271" y="250.909090909091" font-family="Arial, sans-serif" font-size="14.797034642335" fill="var(--warn-text)">Firewall drops, host down, or ICMP blocked</text>
  <text x="70.508474576271" y="275.075757575758" font-family="Arial, sans-serif" font-size="13.740103596454" fill="var(--warn-text)">Check: traceroute</text>

  <rect x="40" y="297.045454545455" width="1200" height="98.863636363636" rx="8.455448367049" fill="url(#grad-danger)" stroke="var(--danger-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="70.508474576271" y="332.19696969697" font-family="Arial, sans-serif" font-size="19.02475882586" font-weight="bold" fill="var(--danger-text)">Network is unreachable</text>
  <text x="70.508474576271" y="362.954545454545" font-family="Arial, sans-serif" font-size="14.797034642335" fill="var(--danger-text)">No route to destination network</text>
  <text x="70.508474576271" y="387.121212121212" font-family="Arial, sans-serif" font-size="13.740103596454" fill="var(--danger-text)">Check: default gateway</text>

  <rect x="40" y="409.090909090909" width="1200" height="98.863636363636" rx="8.455448367049" fill="url(#grad-primary)" stroke="var(--primary-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="70.508474576271" y="444.242424242424" font-family="Arial, sans-serif" font-size="19.02475882586" font-weight="bold" fill="var(--primary-text)">High latency</text>
  <text x="70.508474576271" y="475" font-family="Arial, sans-serif" font-size="14.797034642335" fill="var(--primary-text)">Congestion or suboptimal route</text>
  <text x="70.508474576271" y="499.166666666667" font-family="Arial, sans-serif" font-size="13.740103596454" fill="var(--primary-text)">Check: mtr</text>

  <rect x="40" y="521.136363636364" width="1200" height="98.863636363636" rx="8.455448367049" fill="url(#grad-warn)" stroke="var(--warn-border)" stroke-width="2" filter="url(#shadow)"/>
  <text x="70.508474576271" y="556.287878787879" font-family="Arial, sans-serif" font-size="19.02475882586" font-weight="bold" fill="var(--warn-text)">Packet loss</text>
  <text x="70.508474576271" y="587.045454545455" font-family="Arial, sans-serif" font-size="14.797034642335" fill="var(--warn-text)">Bad cable, wireless noise, flapping link</text>
  <text x="70.508474576271" y="611.212121212121" font-family="Arial, sans-serif" font-size="13.740103596454" fill="var(--warn-text)">Check: mtr + ip -s link</text>
</svg>
