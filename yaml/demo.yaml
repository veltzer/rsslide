title: rsslide Demo
theme: default
paginate: true

slides:
  - title: Welcome to rsslide
    class: lead
    content: A fast, pure-Rust presentation tool. No browser required.

  - title: Key Features
    bullets:
      - Written in Rust
      - Pure PDF generation via printpdf
      - YAML input format
      - No headless browser

  - title: Code Example
    code:
      language: rust
      source: |-
        fn main() {
            println!("Hello from rsslide!");
        }

  - title: Thank You
    content: Questions?

  - title: Centered Title Card
    align: center
    valign: middle
    content: align center + valign middle — great for section breaks.

  - title: Vertically Centered
    valign: middle
    bullets:
      - Content is centred vertically in the slide area
      - Horizontal alignment stays at the default (left)
      - Useful for slides with little content

  - title: Language Icons
    content: Code blocks now show the language icon at the top-right corner.

  - title: Python Example
    code:
      language: python
      source: |-
        def greet(name: str) -> str:
            return f"Hello, {name}!"

        print(greet("rsslide"))

  - title: JavaScript Example
    code:
      language: javascript
      source: |-
        const greet = (name) => `Hello, ${name}!`;
        console.log(greet("rsslide"));

  - title: Go Example
    code:
      language: go
      source: |-
        package main

        import "fmt"

        func main() {
            fmt.Println("Hello from rsslide!")
        }

  - title: Bash Example
    code:
      language: bash
      source: |-
        #!/usr/bin/env bash
        echo "Hello from rsslide!"

